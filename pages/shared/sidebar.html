 <!-- ============================================
   SIDEBAR.HTML - سایدبار مشترک (برای صفحات داشبورد)
   ============================================ -->
<aside class="sidebar" id="mainSidebar">
    <div class="sidebar-header">
        <div class="user-info-sidebar" id="userInfoSidebar">
            <div class="user-avatar-sidebar" id="userAvatarSidebar">👤</div>
            <div class="user-details-sidebar">
                <span class="user-name" id="userNameSidebar">کاربر مهمان</span>
                <span class="user-role" id="userRoleSidebar">کاربر عادی</span>
            </div>
        </div>
    </div>
    
    <nav class="sidebar-nav">
        <ul class="sidebar-menu">
            <li class="sidebar-item">
                <a href="/pages/user/dashboard.html" class="sidebar-link" data-sidebar="dashboard">
                    <span class="sidebar-icon">📊</span>
                    <span class="sidebar-text">داشبورد</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/pages/user/my-bookings.html" class="sidebar-link" data-sidebar="bookings">
                    <span class="sidebar-icon">📅</span>
                    <span class="sidebar-text">نوبت‌های من</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/pages/user/my-favorites.html" class="sidebar-link" data-sidebar="favorites">
                    <span class="sidebar-icon">❤️</span>
                    <span class="sidebar-text">علاقه‌مندی‌ها</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/pages/user/wallet.html" class="sidebar-link" data-sidebar="wallet">
                    <span class="sidebar-icon">💰</span>
                    <span class="sidebar-text">کیف پول</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/pages/user/loyalty-points.html" class="sidebar-link" data-sidebar="loyalty">
                    <span class="sidebar-icon">⭐</span>
                    <span class="sidebar-text">امتیازات وفاداری</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/pages/user/referral.html" class="sidebar-link" data-sidebar="referral">
                    <span class="sidebar-icon">👥</span>
                    <span class="sidebar-text">معرفی دوستان</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/pages/user/profile.html" class="sidebar-link" data-sidebar="profile">
                    <span class="sidebar-icon">👤</span>
                    <span class="sidebar-text">پروفایل من</span>
                </a>
            </li>
            <li class="sidebar-item">
                <a href="/pages/user/settings.html" class="sidebar-link" data-sidebar="settings">
                    <span class="sidebar-icon">⚙️</span>
                    <span class="sidebar-text">تنظیمات</span>
                </a>
            </li>
        </ul>
    </nav>
    
    <div class="sidebar-footer">
        <button class="btn btn-outline btn-block" id="sidebarLogoutBtn">
            🚪 خروج از حساب
        </button>
    </div>
</aside>

<style>
    .sidebar {
        width: 280px;
        background: var(--card-bg);
        border-left: 1px solid var(--border-color);
        height: 100%;
        position: sticky;
        top: 70px;
        padding: 1.5rem 1rem;
        transition: all var(--transition-fast);
    }
    
    .sidebar-header {
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border-color);
    }
    
    .user-info-sidebar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }
    
    .user-avatar-sidebar {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        color: white;
    }
    
    .user-details-sidebar {
        display: flex;
        flex-direction: column;
    }
    
    .user-name {
        font-weight: bold;
        font-size: 0.875rem;
    }
    
    .user-role {
        font-size: 0.75rem;
        color: var(--text-tertiary);
    }
    
    .sidebar-menu {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    
    .sidebar-item {
        margin-bottom: 0.25rem;
    }
    
    .sidebar-link {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        border-radius: var(--radius-md);
        color: var(--text-secondary);
        transition: all var(--transition-fast);
    }
    
    .sidebar-link:hover {
        background: var(--bg-secondary);
        color: var(--color-primary);
    }
    
    .sidebar-link.active {
        background: var(--color-primary-soft);
        color: var(--color-primary);
    }
    
    .sidebar-icon {
        font-size: 1.25rem;
    }
    
    .sidebar-text {
        font-size: 0.875rem;
    }
    
    .sidebar-footer {
        margin-top: 2rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border-color);
    }
    
    @media (max-width: 768px) {
        .sidebar {
            position: fixed;
            top: 0;
            right: -280px;
            bottom: 0;
            z-index: 1000;
            height: 100vh;
            transition: right var(--transition-normal);
        }
        
        .sidebar.open {
            right: 0;
        }
        
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        
        .sidebar-overlay.open {
            display: block;
        }
    }
</style>

<script>
    (function() {
        // فعال‌سازی لینک فعال در سایدبار
        const currentPath = window.location.pathname;
        const sidebarLinks = document.querySelectorAll('.sidebar-link');
        
        sidebarLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (href && currentPath.includes(href.replace('/pages/user/', ''))) {
                link.classList.add('active');
            }
        });
        
        // خروج از حساب
        const logoutBtn = document.getElementById('sidebarLogoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = '/';
            });
        }
        
        // نمایش اطلاعات کاربر در سایدبار
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
        if (user) {
            const userNameSpan = document.getElementById('userNameSidebar');
            const userRoleSpan = document.getElementById('userRoleSidebar');
            const userAvatar = document.getElementById('userAvatarSidebar');
            
            if (userNameSpan) userNameSpan.textContent = user.name || 'کاربر';
            if (userRoleSpan) userRoleSpan.textContent = user.role === 'user' ? 'کاربر عادی' : user.role === 'business' ? 'کسب‌وکار' : 'ادمین';
            if (userAvatar && user.name) userAvatar.textContent = user.name.charAt(0);
        }
    })();
</script>
