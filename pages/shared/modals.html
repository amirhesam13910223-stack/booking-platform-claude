 <!-- ============================================
   MODALS.HTML - مودال‌های مشترک
   ============================================ -->

<!-- مودال ورود -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>ورود به حساب کاربری</h3>
            <button class="modal-close" data-modal-close="loginModal">&times;</button>
        </div>
        <div class="modal-body">
            <div id="loginError" class="error-message" style="display:none;"></div>
            <form id="sharedLoginForm">
                <div class="form-group">
                    <label>شماره تماس یا ایمیل</label>
                    <input type="text" id="sharedLoginUsername" class="form-control" placeholder="example@gmail.com یا ۰۹۱۲۱۲۳۴۵۶۷">
                </div>
                <div class="form-group">
                    <label>رمز عبور</label>
                    <input type="password" id="sharedLoginPassword" class="form-control" placeholder="********">
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="sharedLoginRemember"> مرا به خاطر بسپار
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-block">ورود</button>
                <div class="modal-footer-links">
                    <a href="#" id="sharedForgotPasswordLink">فراموشی رمز عبور؟</a>
                    <a href="#" id="sharedSwitchToRegister">ثبت‌نام نکرده‌اید؟</a>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- مودال ثبت‌نام -->
<div class="modal" id="registerModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>ثبت‌نام در پلتفرم</h3>
            <button class="modal-close" data-modal-close="registerModal">&times;</button>
        </div>
        <div class="modal-body">
            <div id="registerError" class="error-message" style="display:none;"></div>
            <form id="sharedRegisterForm">
                <div class="form-group">
                    <label>نام کامل</label>
                    <input type="text" id="sharedRegFullName" class="form-control" placeholder="نام و نام خانوادگی">
                </div>
                <div class="form-group">
                    <label>شماره تماس</label>
                    <input type="tel" id="sharedRegPhone" class="form-control" placeholder="۰۹۱۲۱۲۳۴۵۶۷">
                </div>
                <div class="form-group">
                    <label>ایمیل (اختیاری)</label>
                    <input type="email" id="sharedRegEmail" class="form-control" placeholder="example@gmail.com">
                </div>
                <div class="form-group">
                    <label>رمز عبور</label>
                    <input type="password" id="sharedRegPassword" class="form-control" placeholder="حداقل ۶ کاراکتر">
                </div>
                <div class="form-group">
                    <label>تکرار رمز عبور</label>
                    <input type="password" id="sharedRegPasswordConfirm" class="form-control" placeholder="تکرار رمز عبور">
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="sharedRegTerms"> <a href="/pages/public/terms.html">قوانین و مقررات</a> را می‌پذیرم
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-block">ثبت‌نام</button>
                <div class="modal-footer-links">
                    <a href="#" id="sharedSwitchToLogin">قبلاً ثبت‌نام کرده‌اید؟</a>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- مودال فراموشی رمز عبور -->
<div class="modal" id="forgotPasswordModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>بازیابی رمز عبور</h3>
            <button class="modal-close" data-modal-close="forgotPasswordModal">&times;</button>
        </div>
        <div class="modal-body">
            <div id="forgotError" class="error-message" style="display:none;"></div>
            <div id="forgotSuccess" class="success-message" style="display:none;"></div>
            <form id="sharedForgotForm">
                <div class="form-group">
                    <label>شماره تماس</label>
                    <input type="tel" id="sharedForgotPhone" class="form-control" placeholder="۰۹۱۲۱۲۳۴۵۶۷">
                </div>
                <button type="submit" class="btn btn-primary btn-block">ارسال کد بازیابی</button>
            </form>
        </div>
    </div>
</div>

<!-- مودال اطلاع‌رسانی -->
<div class="modal" id="infoModal">
    <div class="modal-content modal-sm">
        <div class="modal-header">
            <h3 id="infoModalTitle">اطلاعیه</h3>
            <button class="modal-close" data-modal-close="infoModal">&times;</button>
        </div>
        <div class="modal-body">
            <p id="infoModalMessage"></p>
            <button class="btn btn-primary btn-block" data-modal-close="infoModal">متوجه شدم</button>
        </div>
    </div>
</div>

<!-- مودال تأیید -->
<div class="modal" id="confirmModal">
    <div class="modal-content modal-sm">
        <div class="modal-header">
            <h3 id="confirmModalTitle">تأیید عملیات</h3>
            <button class="modal-close" data-modal-close="confirmModal">&times;</button>
        </div>
        <div class="modal-body">
            <p id="confirmModalMessage">آیا از انجام این عملیات مطمئن هستید؟</p>
            <div class="modal-actions" style="display:flex; gap:1rem; margin-top:1rem;">
                <button class="btn btn-outline" id="confirmModalCancel">انصراف</button>
                <button class="btn btn-primary" id="confirmModalOk">تأیید</button>
            </div>
        </div>
    </div>
</div>

<style>
    .error-message {
        background: var(--color-danger-soft);
        color: var(--color-danger);
        padding: 0.75rem;
        border-radius: var(--radius-md);
        margin-bottom: 1rem;
        font-size: 0.875rem;
    }
    .success-message {
        background: var(--color-success-soft);
        color: var(--color-success);
        padding: 0.75rem;
        border-radius: var(--radius-md);
        margin-bottom: 1rem;
        font-size: 0.875rem;
    }
</style>

<script>
    (function() {
        // توابع عمومی برای مودال‌ها
        window.openModal = function(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        };
        
        window.closeModal = function(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        };
        
        // بستن مودال با کلیک خارج
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.classList.remove('active');
                document.body.style.overflow = '';
            }
        });
        
        // دکمه‌های بستن
        document.querySelectorAll('[data-modal-close]').forEach(btn => {
            btn.addEventListener('click', () => {
                const modalId = btn.getAttribute('data-modal-close');
                window.closeModal(modalId);
            });
        });
        
        // فرم ورود
        const loginForm = document.getElementById('sharedLoginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('sharedLoginUsername')?.value;
                const password = document.getElementById('sharedLoginPassword')?.value;
                const remember = document.getElementById('sharedLoginRemember')?.checked;
                
                if (!username || !password) {
                    const errorDiv = document.getElementById('loginError');
                    if (errorDiv) {
                        errorDiv.textContent = 'لطفاً نام کاربری و رمز عبور را وارد کنید';
                        errorDiv.style.display = 'block';
                        setTimeout(() => errorDiv.style.display = 'none', 3000);
                    }
                    return;
                }
                
                // شبیه‌سازی ورود
                const isValid = (username === '09121234567' || username === 'test@example.com') && password === '123456';
                
                if (isValid) {
                    const user = { id: 1, name: 'کاربر تست', phone: '09121234567', role: 'user' };
                    if (remember) {
                        localStorage.setItem('auth_token', 'demo_token');
                        localStorage.setItem('user', JSON.stringify(user));
                    } else {
                        sessionStorage.setItem('auth_token', 'demo_token');
                        sessionStorage.setItem('user', JSON.stringify(user));
                    }
                    window.closeModal('loginModal');
                    window.location.reload();
                } else {
                    const errorDiv = document.getElementById('loginError');
                    if (errorDiv) {
                        errorDiv.textContent = 'نام کاربری یا رمز عبور اشتباه است';
                        errorDiv.style.display = 'block';
                        setTimeout(() => errorDiv.style.display = 'none', 3000);
                    }
                }
            });
        }
        
        // فرم ثبت‌نام
        const registerForm = document.getElementById('sharedRegisterForm');
        if (registerForm) {
            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('sharedRegFullName')?.value;
                const phone = document.getElementById('sharedRegPhone')?.value;
                const password = document.getElementById('sharedRegPassword')?.value;
                const confirm = document.getElementById('sharedRegPasswordConfirm')?.value;
                const terms = document.getElementById('sharedRegTerms')?.checked;
                
                if (!name || !phone || !password) {
                    const errorDiv = document.getElementById('registerError');
                    if (errorDiv) {
                        errorDiv.textContent = 'لطفاً تمام فیلدهای الزامی را پر کنید';
                        errorDiv.style.display = 'block';
                        setTimeout(() => errorDiv.style.display = 'none', 3000);
                    }
                    return;
                }
                
                if (password !== confirm) {
                    const errorDiv = document.getElementById('registerError');
                    if (errorDiv) {
                        errorDiv.textContent = 'رمز عبور و تکرار آن مطابقت ندارند';
                        errorDiv.style.display = 'block';
                        setTimeout(() => errorDiv.style.display = 'none', 3000);
                    }
                    return;
                }
                
                if (!terms) {
                    const errorDiv = document.getElementById('registerError');
                    if (errorDiv) {
                        errorDiv.textContent = 'لطفاً قوانین و مقررات را بپذیرید';
                        errorDiv.style.display = 'block';
                        setTimeout(() => errorDiv.style.display = 'none', 3000);
                    }
                    return;
                }
                
                const user = { id: Date.now(), name: name, phone: phone, role: 'user' };
                localStorage.setItem('auth_token', 'demo_token');
                localStorage.setItem('user', JSON.stringify(user));
                window.closeModal('registerModal');
                window.location.reload();
            });
        }
        
        // دکمه‌های ورود/ثبت‌نام
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        
        if (loginBtn) loginBtn.addEventListener('click', () => window.openModal('loginModal'));
        if (registerBtn) registerBtn.addEventListener('click', () => window.openModal('registerModal'));
        
        // تغییر بین مودال‌ها
        const switchToRegister = document.getElementById('sharedSwitchToRegister');
        const switchToLogin = document.getElementById('sharedSwitchToLogin');
        
        if (switchToRegister) {
            switchToRegister.addEventListener('click', (e) => {
                e.preventDefault();
                window.closeModal('loginModal');
                window.openModal('registerModal');
            });
        }
        
        if (switchToLogin) {
            switchToLogin.addEventListener('click', (e) => {
                e.preventDefault();
                window.closeModal('registerModal');
                window.openModal('loginModal');
            });
        }
        
        // فراموشی رمز
        const forgotLink = document.getElementById('sharedForgotPasswordLink');
        if (forgotLink) {
            forgotLink.addEventListener('click', (e) => {
                e.preventDefault();
                window.closeModal('loginModal');
                window.openModal('forgotPasswordModal');
            });
        }
        
        // فرم فراموشی رمز
        const forgotForm = document.getElementById('sharedForgotForm');
        if (forgotForm) {
            forgotForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const phone = document.getElementById('sharedForgotPhone')?.value;
                if (!phone) {
                    const errorDiv = document.getElementById('forgotError');
                    if (errorDiv) {
                        errorDiv.textContent = 'لطفاً شماره تماس را وارد کنید';
                        errorDiv.style.display = 'block';
                        setTimeout(() => errorDiv.style.display = 'none', 3000);
                    }
                    return;
                }
                const successDiv = document.getElementById('forgotSuccess');
                if (successDiv) {
                    successDiv.textContent = 'کد بازیابی به شماره شما ارسال شد';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.closeModal('forgotPasswordModal');
                        window.openModal('loginModal');
                    }, 2000);
                }
            });
        }
        
        // نمایش اطلاع‌رسانی
        window.showInfoModal = function(title, message) {
            const titleEl = document.getElementById('infoModalTitle');
            const msgEl = document.getElementById('infoModalMessage');
            if (titleEl) titleEl.textContent = title;
            if (msgEl) msgEl.textContent = message;
            window.openModal('infoModal');
        };
        
        // نمایش مودال تأیید
        window.showConfirmModal = function(title, message, onConfirm) {
            const titleEl = document.getElementById('confirmModalTitle');
            const msgEl = document.getElementById('confirmModalMessage');
            if (titleEl) titleEl.textContent = title;
            if (msgEl) msgEl.textContent = message;
            
            const confirmBtn = document.getElementById('confirmModalOk');
            const cancelBtn = document.getElementById('confirmModalCancel');
            
            const cleanup = () => {
                window.closeModal('confirmModal');
                if (confirmBtn) confirmBtn.removeEventListener('click', handler);
            };
            
            const handler = () => {
                cleanup();
                if (onConfirm) onConfirm();
            };
            
            if (confirmBtn) {
                confirmBtn.removeEventListener('click', handler);
                confirmBtn.addEventListener('click', handler);
            }
            if (cancelBtn) {
                cancelBtn.removeEventListener('click', cleanup);
                cancelBtn.addEventListener('click', cleanup);
            }
            
            window.openModal('confirmModal');
        };
        
        // بررسی توکن
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        if (token && (loginBtn || registerBtn)) {
            if (loginBtn) loginBtn.style.display = 'none';
            if (registerBtn) registerBtn.style.display = 'none';
        }
    })();
</script>
