<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت خدمات | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/layouts/header.css">
    <link rel="stylesheet" href="../../css/layouts/footer.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/components/forms.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .container-page { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
        .service-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.5rem; }
        .service-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .service-name { font-size: 1.125rem; font-weight: bold; }
        .service-price { font-size: 1.25rem; font-weight: bold; color: var(--color-primary); }
        .service-duration { color: var(--text-tertiary); font-size: 0.875rem; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <header class="main-header"><div class="container"><div class="header-wrapper"><div class="logo"><a href="../../index.html"><span class="logo-text">📅 نوبت‌دهی هوشمند</span></a></div><button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button><nav class="main-nav" id="mainNav"><ul class="nav-list"><li><a href="../../index.html" class="nav-link">خانه</a></li><li><a href="dashboard.html" class="nav-link">داشبورد</a></li><li><a href="services.html" class="nav-link active">خدمات</a></li></ul></nav><div class="header-actions"><button class="theme-toggle" id="themeToggle">🌙</button><button class="btn btn-outline" id="logoutBtn">خروج</button></div></div></div></header>

    <main><div class="container-page">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;"><h1>🔧 مدیریت خدمات</h1><button class="btn btn-primary" id="addServiceBtn">➕ افزودن خدمت</button></div>
        <div class="services-grid" id="servicesGrid"></div>
    </div></main>

    <footer class="main-footer"><div class="container"><div class="footer-grid"><div class="footer-col"><h4>📅 نوبت‌دهی هوشمند</h4><p>پلتفرم پیشرو در ارائه خدمات رزرو آنلاین</p></div></div><div class="footer-bottom"><p>&copy; ۱۴۰۴ تمامی حقوق محفوظ است.</p></div></div></footer>

    <script>
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
        if (!token || !user || user.role !== 'business') { window.location.href = '../auth/login.html'; }

        let services = [{ id:1, name:'کوتاهی مو', duration:45, price:250000 }, { id:2, name:'رنگ مو', duration:120, price:450000 }, { id:3, name:'ماسک مو', duration:30, price:150000 }];
        function renderServices() { document.getElementById('servicesGrid').innerHTML = services.map(s => `<div class="service-card"><div class="service-header"><span class="service-name">${s.name}</span><button class="btn btn-outline btn-sm delete-service" data-id="${s.id}">🗑️</button></div><div class="service-price">${s.price.toLocaleString('fa-IR')} تومان</div><div class="service-duration">⏱️ ${s.duration} دقیقه</div></div>`).join('');
            document.querySelectorAll('.delete-service').forEach(btn => btn.addEventListener('click', (e) => { let id = parseInt(e.target.dataset.id); if(confirm('حذف شود؟')){ services = services.filter(s=>s.id!==id); renderServices(); } })); }
        document.getElementById('addServiceBtn').addEventListener('click', () => { let name = prompt('نام خدمت:'); if(name){ let duration = parseInt(prompt('مدت زمان (دقیقه):')); let price = parseInt(prompt('قیمت (تومان):')); services.push({ id:Date.now(), name, duration, price }); renderServices(); } });
        renderServices();

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); sessionStorage.clear(); window.location.href = '../../index.html'; });
        const mobileToggle = document.getElementById('mobileMenuToggle'), mainNav = document.getElementById('mainNav');
        mobileToggle?.addEventListener('click', () => mainNav.classList.toggle('active'));
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark-theme'); themeToggle.textContent = '☀️'; }
        themeToggle?.addEventListener('click', () => { const html = document.documentElement; if (html.classList.contains('dark-theme')) { html.classList.remove('dark-theme'); localStorage.setItem('theme', 'light'); themeToggle.textContent = '🌙'; } else { html.classList.add('dark-theme'); localStorage.setItem('theme', 'dark'); themeToggle.textContent = '☀️'; } });
    </script>
</body>
</html>
