<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظرات مشتریان | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/layouts/header.css">
    <link rel="stylesheet" href="../../css/layouts/footer.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .container-page { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .rating-summary { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.5rem; text-align: center; margin-bottom: 2rem; }
        .average-rating { font-size: 3rem; font-weight: bold; color: #F59E0B; }
        .review-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .reviewer-name { font-weight: bold; }
        .review-rating { color: #F59E0B; }
        .review-date { font-size: 0.75rem; color: var(--text-tertiary); }
        .review-content { margin-top: 0.5rem; line-height: 1.6; }
    </style>
</head>
<body>
    <header class="main-header"><div class="container"><div class="header-wrapper"><div class="logo"><a href="../../index.html"><span class="logo-text">📅 نوبت‌دهی هوشمند</span></a></div><button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button><nav class="main-nav" id="mainNav"><ul class="nav-list"><li><a href="../../index.html" class="nav-link">خانه</a></li><li><a href="dashboard.html" class="nav-link">داشبورد</a></li><li><a href="reviews.html" class="nav-link active">نظرات</a></li></ul></nav><div class="header-actions"><button class="theme-toggle" id="themeToggle">🌙</button><button class="btn btn-outline" id="logoutBtn">خروج</button></div></div></div></header>

    <main><div class="container-page">
        <h1 style="margin-bottom: 1.5rem;">⭐ نظرات مشتریان</h1>
        <div class="rating-summary"><div class="average-rating">۴.۸</div><div>از ۱۲۳ نظر</div></div>
        <div id="reviewsList"></div>
    </div></main>

    <footer class="main-footer"><div class="container"><div class="footer-grid"><div class="footer-col"><h4>📅 نوبت‌دهی هوشمند</h4><p>پلتفرم پیشرو در ارائه خدمات رزرو آنلاین</p></div></div><div class="footer-bottom"><p>&copy; ۱۴۰۴ تمامی حقوق محفوظ است.</p></div></div></footer>

    <script>
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
        if (!token || !user || user.role !== 'business') { window.location.href = '../auth/login.html'; }

        let reviews = [{ name:'سارا محمدی', rating:5, date:'۱۴۰۳/۱۲/۱۰', content:'عالی بود، حتماً دوباره میام' }, { name:'مریم احمدی', rating:4, date:'۱۴۰۳/۱۲/۰۸', content:'خدمات خوب، محیط تمیز' }, { name:'نرگس کریمی', rating:5, date:'۱۴۰۳/۱۲/۰۵', content:'راضی بودم' }];
        document.getElementById('reviewsList').innerHTML = reviews.map(r => `<div class="review-card"><div class="review-header"><span class="reviewer-name">${r.name}</span><span class="review-rating">${'⭐'.repeat(r.rating)}</span><span class="review-date">${r.date}</span></div><div class="review-content">${r.content}</div></div>`).join('');

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); sessionStorage.clear(); window.location.href = '../../index.html'; });
        const mobileToggle = document.getElementById('mobileMenuToggle'), mainNav = document.getElementById('mainNav');
        mobileToggle?.addEventListener('click', () => mainNav.classList.toggle('active'));
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark-theme'); themeToggle.textContent = '☀️'; }
        themeToggle?.addEventListener('click', () => { const html = document.documentElement; if (html.classList.contains('dark-theme')) { html.classList.remove('dark-theme'); localStorage.setItem('theme', 'light'); themeToggle.textContent = '🌙'; } else { html.classList.add('dark-theme'); localStorage.setItem('theme', 'dark'); themeToggle.textContent = '☀️'; } });
    </script>
</body>
</html>
