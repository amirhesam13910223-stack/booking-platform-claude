<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت نوبت‌ها | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/layouts/header.css">
    <link rel="stylesheet" href="../../css/layouts/footer.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .container-page { max-width: 1400px; margin: 2rem auto; padding: 0 1rem; }
        .filters { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
        .filter-select { padding: 0.5rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--input-bg); }
        .search-input { flex: 1; min-width: 200px; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); }
        .bookings-table { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: right; border-bottom: 1px solid var(--border-color); }
        th { background: var(--bg-secondary); font-weight: 600; }
        .status-badge { padding: 0.25rem 0.5rem; border-radius: var(--radius-full); font-size: 0.75rem; }
        .status-confirmed { background: var(--color-success-soft); color: var(--color-success); }
        .status-pending { background: var(--color-warning-soft); color: var(--color-warning); }
        .status-completed { background: var(--color-info-soft); color: var(--color-info); }
        .status-cancelled { background: var(--color-danger-soft); color: var(--color-danger); }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; margin: 0 0.25rem; }
    </style>
</head>
<body>
    <header class="main-header"><div class="container"><div class="header-wrapper"><div class="logo"><a href="../../index.html"><span class="logo-text">📅 نوبت‌دهی هوشمند</span></a></div><button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button><nav class="main-nav" id="mainNav"><ul class="nav-list"><li><a href="../../index.html" class="nav-link">خانه</a></li><li><a href="dashboard.html" class="nav-link">داشبورد</a></li><li><a href="bookings.html" class="nav-link active">نوبت‌ها</a></li><li><a href="staff.html" class="nav-link">کارکنان</a></li></ul></nav><div class="header-actions"><button class="theme-toggle" id="themeToggle">🌙</button><button class="btn btn-outline" id="logoutBtn">خروج</button></div></div></div></header>

    <main><div class="container-page">
        <h1 style="margin-bottom: 1.5rem;">📋 مدیریت نوبت‌ها</h1>
        <div class="filters">
            <input type="text" id="searchInput" class="search-input" placeholder="جستجوی مشتری...">
            <select id="statusFilter" class="filter-select"><option value="all">همه</option><option value="pending">در انتظار</option><option value="confirmed">تأیید شده</option><option value="completed">انجام شده</option><option value="cancelled">لغو شده</option></select>
            <input type="date" id="dateFilter" class="filter-select">
        </div>
        <div class="bookings-table"><table><thead><tr><th>مشتری</th><th>خدمت</th><th>تاریخ</th><th>ساعت</th><th>مبلغ</th><th>وضعیت</th><th>عملیات</th></tr></thead><tbody id="bookingsBody"></tbody></table></div>
    </div></main>

    <footer class="main-footer"><div class="container"><div class="footer-grid"><div class="footer-col"><h4>📅 نوبت‌دهی هوشمند</h4><p>پلتفرم پیشرو در ارائه خدمات رزرو آنلاین</p></div></div><div class="footer-bottom"><p>&copy; ۱۴۰۴ تمامی حقوق محفوظ است.</p></div></div></footer>

    <script>
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
        if (!token || !user || user.role !== 'business') { window.location.href = '../auth/login.html'; }

        let bookings = [
            { id:1, customer:'سارا محمدی', service:'کوتاهی مو', date:'۱۴۰۳/۱۲/۲۰', time:'۱۰:۰۰', amount:250000, status:'confirmed' },
            { id:2, customer:'مریم احمدی', service:'رنگ مو', date:'۱۴۰۳/۱۲/۲۰', time:'۱۱:۳۰', amount:450000, status:'pending' },
            { id:3, customer:'نرگس کریمی', service:'ماسک مو', date:'۱۴۰۳/۱۲/۲۱', time:'۱۴:۰۰', amount:150000, status:'confirmed' },
            { id:4, customer:'زهرا رضایی', service:'حنا گذاری', date:'۱۴۰۳/۱۲/۲۲', time:'۱۶:۳۰', amount:200000, status:'completed' }
        ];

        function renderBookings() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            const date = document.getElementById('dateFilter').value;
            let filtered = bookings.filter(b => (b.customer.toLowerCase().includes(search)) && (status === 'all' || b.status === status) && (!date || b.date === date));
            document.getElementById('bookingsBody').innerHTML = filtered.map(b => `<tr><td>${b.customer}</td><td>${b.service}</td><td>${b.date}</td><td>${b.time}</td><td>${b.amount.toLocaleString('fa-IR')}</td>
            <td><span class="status-badge status-${b.status}">${b.status === 'confirmed' ? 'تأیید شده' : b.status === 'pending' ? 'در انتظار' : b.status === 'completed' ? 'انجام شده' : 'لغو شده'}</span></td>
            <td>${b.status === 'pending' ? '<button class="action-btn confirm-booking" data-id="'+b.id+'">✅</button><button class="action-btn reject-booking" data-id="'+b.id+'">❌</button>' : ''}</td></tr>`).join('');
            document.querySelectorAll('.confirm-booking').forEach(btn => btn.addEventListener('click', (e) => { let id = parseInt(e.target.dataset.id); let idx = bookings.findIndex(b=>b.id===id); if(idx!==-1){ bookings[idx].status='confirmed'; renderBookings(); } }));
            document.querySelectorAll('.reject-booking').forEach(btn => btn.addEventListener('click', (e) => { let id = parseInt(e.target.dataset.id); let idx = bookings.findIndex(b=>b.id===id); if(idx!==-1){ bookings[idx].status='cancelled'; renderBookings(); } }));
        }
        document.getElementById('searchInput').addEventListener('input', renderBookings);
        document.getElementById('statusFilter').addEventListener('change', renderBookings);
        document.getElementById('dateFilter').addEventListener('change', renderBookings);
        renderBookings();

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); sessionStorage.clear(); window.location.href = '../../index.html'; });
        const mobileToggle = document.getElementById('mobileMenuToggle'), mainNav = document.getElementById('mainNav');
        mobileToggle?.addEventListener('click', () => mainNav.classList.toggle('active'));
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark-theme'); themeToggle.textContent = '☀️'; }
        themeToggle?.addEventListener('click', () => { const html = document.documentElement; if (html.classList.contains('dark-theme')) { html.classList.remove('dark-theme'); localStorage.setItem('theme', 'light'); themeToggle.textContent = '🌙'; } else { html.classList.add('dark-theme'); localStorage.setItem('theme', 'dark'); themeToggle.textContent = '☀️'; } });
    </script>
</body>
</html>
