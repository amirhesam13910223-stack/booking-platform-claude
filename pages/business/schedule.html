<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زمانبندی کاری | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/layouts/header.css">
    <link rel="stylesheet" href="../../css/layouts/footer.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/components/forms.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .container-page { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .schedule-table { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); overflow: hidden; }
        .schedule-row { display: flex; border-bottom: 1px solid var(--border-color); }
        .schedule-row:last-child { border-bottom: none; }
        .day-name { width: 120px; padding: 1rem; font-weight: bold; background: var(--bg-secondary); }
        .day-hours { flex: 1; padding: 1rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .time-input { padding: 0.5rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); width: 100px; }
        .break-list { margin-top: 2rem; }
        .break-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; border-bottom: 1px solid var(--border-color); }
    </style>
</head>
<body>
    <header class="main-header"><div class="container"><div class="header-wrapper"><div class="logo"><a href="../../index.html"><span class="logo-text">📅 نوبت‌دهی هوشمند</span></a></div><button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button><nav class="main-nav" id="mainNav"><ul class="nav-list"><li><a href="../../index.html" class="nav-link">خانه</a></li><li><a href="dashboard.html" class="nav-link">داشبورد</a></li><li><a href="schedule.html" class="nav-link active">زمانبندی</a></li></ul></nav><div class="header-actions"><button class="theme-toggle" id="themeToggle">🌙</button><button class="btn btn-outline" id="logoutBtn">خروج</button></div></div></div></header>

    <main><div class="container-page">
        <h1 style="margin-bottom: 1.5rem;">📅 زمانبندی کاری</h1>
        <div class="schedule-table" id="scheduleTable"></div>
        <div class="break-list"><h3>⏸️ زمان‌های استراحت</h3><div id="breaksList"></div><button class="btn btn-outline btn-sm" id="addBreakBtn">➕ افزودن زمان استراحت</button></div>
        <button class="btn btn-primary" id="saveBtn" style="margin-top: 1.5rem;">💾 ذخیره تغییرات</button>
    </div></main>

    <footer class="main-footer"><div class="container"><div class="footer-grid"><div class="footer-col"><h4>📅 نوبت‌دهی هوشمند</h4><p>پلتفرم پیشرو در ارائه خدمات رزرو آنلاین</p></div></div><div class="footer-bottom"><p>&copy; ۱۴۰۴ تمامی حقوق محفوظ است.</p></div></div></footer>

    <script>
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
        if (!token || !user || user.role !== 'business') { window.location.href = '../auth/login.html'; }

        let schedule = { saturday:{start:'09:00',end:'20:00',active:true}, sunday:{start:'09:00',end:'20:00',active:true}, monday:{start:'09:00',end:'20:00',active:true}, tuesday:{start:'09:00',end:'20:00',active:true}, wednesday:{start:'09:00',end:'20:00',active:true}, thursday:{start:'09:00',end:'14:00',active:true}, friday:{start:'09:00',end:'20:00',active:false} };
        let breaks = [{ id:1, name:'استراحت ناهار', start:'13:00', end:'14:00' }];

        function renderSchedule() { const days = ['saturday','sunday','monday','tuesday','wednesday','thursday','friday']; const names = ['شنبه','یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه']; let html = ''; days.forEach((day,i)=> { html += `<div class="schedule-row"><div class="day-name">${names[i]}</div><div class="day-hours"><input type="time" id="start_${day}" class="time-input" value="${schedule[day].start}" ${!schedule[day].active ? 'disabled' : ''}><span>تا</span><input type="time" id="end_${day}" class="time-input" value="${schedule[day].end}" ${!schedule[day].active ? 'disabled' : ''}><label><input type="checkbox" id="active_${day}" ${schedule[day].active ? 'checked' : ''}> فعال</label></div></div>`; }); document.getElementById('scheduleTable').innerHTML = html; }
        function renderBreaks() { document.getElementById('breaksList').innerHTML = breaks.map(b => `<div class="break-item"><span>${b.name}: ${b.start} - ${b.end}</span><button class="btn btn-outline btn-sm delete-break" data-id="${b.id}">🗑️</button></div>`).join('');
            document.querySelectorAll('.delete-break').forEach(btn => btn.addEventListener('click', (e) => { let id = parseInt(e.target.dataset.id); breaks = breaks.filter(b=>b.id!==id); renderBreaks(); })); }
        renderSchedule(); renderBreaks();

        document.getElementById('addBreakBtn').addEventListener('click', () => { let name = prompt('عنوان:'); if(name){ let start = prompt('ساعت شروع:'); let end = prompt('ساعت پایان:'); breaks.push({ id:Date.now(), name, start, end }); renderBreaks(); } });
        document.getElementById('saveBtn').addEventListener('click', () => { const days = ['saturday','sunday','monday','tuesday','wednesday','thursday','friday']; days.forEach(day => { schedule[day].start = document.getElementById(`start_${day}`).value; schedule[day].end = document.getElementById(`end_${day}`).value; schedule[day].active = document.getElementById(`active_${day}`).checked; }); alert('تنظیمات ذخیره شد'); });

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); sessionStorage.clear(); window.location.href = '../../index.html'; });
        const mobileToggle = document.getElementById('mobileMenuToggle'), mainNav = document.getElementById('mainNav');
        mobileToggle?.addEventListener('click', () => mainNav.classList.toggle('active'));
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark-theme'); themeToggle.textContent = '☀️'; }
        themeToggle?.addEventListener('click', () => { const html = document.documentElement; if (html.classList.contains('dark-theme')) { html.classList.remove('dark-theme'); localStorage.setItem('theme', 'light'); themeToggle.textContent = '🌙'; } else { html.classList.add('dark-theme'); localStorage.setItem('theme', 'dark'); themeToggle.textContent = '☀️'; } });
    </script>
</body>
</html>
