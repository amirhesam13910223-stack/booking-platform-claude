<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت شعبات | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/layouts/header.css">
    <link rel="stylesheet" href="../../css/layouts/footer.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .container-page { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .branch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
        .branch-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.5rem; }
        .branch-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .branch-name { font-size: 1.125rem; font-weight: bold; }
        .branch-info p { margin: 0.5rem 0; font-size: 0.875rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <header class="main-header"><div class="container"><div class="header-wrapper"><div class="logo"><a href="../../index.html"><span class="logo-text">📅 نوبت‌دهی هوشمند</span></a></div><button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button><nav class="main-nav" id="mainNav"><ul class="nav-list"><li><a href="../../index.html" class="nav-link">خانه</a></li><li><a href="dashboard.html" class="nav-link">داشبورد</a></li><li><a href="branches.html" class="nav-link active">شعبات</a></li></ul></nav><div class="header-actions"><button class="theme-toggle" id="themeToggle">🌙</button><button class="btn btn-outline" id="logoutBtn">خروج</button></div></div></div></header>

    <main><div class="container-page">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;"><h1>🏢 مدیریت شعبات</h1><button class="btn btn-primary" id="addBranchBtn">➕ افزودن شعبه</button></div>
        <div class="branch-grid" id="branchGrid"></div>
    </div></main>

    <footer class="main-footer"><div class="container"><div class="footer-grid"><div class="footer-col"><h4>📅 نوبت‌دهی هوشمند</h4><p>پلتفرم پیشرو در ارائه خدمات رزرو آنلاین</p></div></div><div class="footer-bottom"><p>&copy; ۱۴۰۴ تمامی حقوق محفوظ است.</p></div></div></footer>

    <script>
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
        if (!token || !user || user.role !== 'business') { window.location.href = '../auth/login.html'; }

        let branches = [{ id:1, name:'شعبه مرکزی', address:'تهران، خیابان ولیعصر', phone:'021-12345678', manager:'مریم احمدی' }];
        function renderBranches() { document.getElementById('branchGrid').innerHTML = branches.map(b => `<div class="branch-card"><div class="branch-header"><span class="branch-name">${b.name}</span><button class="btn btn-outline btn-sm delete-branch" data-id="${b.id}">🗑️</button></div><div class="branch-info"><p>📍 ${b.address}</p><p>📞 ${b.phone}</p><p>👤 مدیر: ${b.manager}</p></div></div>`).join('');
            document.querySelectorAll('.delete-branch').forEach(btn => btn.addEventListener('click', (e) => { let id = parseInt(e.target.dataset.id); if(confirm('حذف شود؟')){ branches = branches.filter(b=>b.id!==id); renderBranches(); } })); }
        document.getElementById('addBranchBtn').addEventListener('click', () => { let name = prompt('نام شعبه:'); if(name){ let address = prompt('آدرس:'); let phone = prompt('شماره تماس:'); let manager = prompt('نام مدیر:'); branches.push({ id:Date.now(), name, address, phone, manager }); renderBranches(); } });
        renderBranches();

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); sessionStorage.clear(); window.location.href = '../../index.html'; });
        const mobileToggle = document.getElementById('mobileMenuToggle'), mainNav = document.getElementById('mainNav');
        mobileToggle?.addEventListener('click', () => mainNav.classList.toggle('active'));
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark-theme'); themeToggle.textContent = '☀️'; }
        themeToggle?.addEventListener('click', () => { const html = document.documentElement; if (html.classList.contains('dark-theme')) { html.classList.remove('dark-theme'); localStorage.setItem('theme', 'light'); themeToggle.textContent = '🌙'; } else { html.classList.add('dark-theme'); localStorage.setItem('theme', 'dark'); themeToggle.textContent = '☀️'; } });
    </script>
</body>
</html>
