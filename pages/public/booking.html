<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رزرو نوبت | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/layouts/header.css">
    <link rel="stylesheet" href="../../css/layouts/footer.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/components/forms.css">
    <link rel="stylesheet" href="../../css/components/cards.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .booking-container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .step-indicator { display: flex; justify-content: space-between; margin-bottom: 2rem; position: relative; }
        .step { flex: 1; text-align: center; position: relative; }
        .step-number { width: 40px; height: 40px; background: var(--bg-secondary); border: 2px solid var(--border-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.5rem; font-weight: bold; }
        .step.active .step-number { background: var(--color-primary); border-color: var(--color-primary); color: white; }
        .step.completed .step-number { background: var(--color-success); border-color: var(--color-success); color: white; }
        .step-label { font-size: 0.875rem; color: var(--text-tertiary); }
        .step.active .step-label { color: var(--color-primary); font-weight: bold; }
        .booking-step { display: none; }
        .booking-step.active { display: block; }
        .business-grid, .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin: 1rem 0; }
        .business-card, .service-card { border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 1rem; cursor: pointer; transition: all var(--transition-fast); }
        .business-card:hover, .service-card:hover { border-color: var(--color-primary); transform: translateY(-2px); }
        .business-card.selected, .service-card.selected { border-color: var(--color-primary); background: var(--color-primary-soft); }
        .time-slots { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 0.5rem; margin-top: 1rem; }
        .time-slot { text-align: center; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); cursor: pointer; }
        .time-slot.selected { background: var(--color-primary); color: white; border-color: var(--color-primary); }
        .time-slot.booked { opacity: 0.5; cursor: not-allowed; text-decoration: line-through; }
        .booking-summary { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1rem; margin: 1rem 0; }
        .summary-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border-color); }
        .booking-actions { display: flex; justify-content: space-between; margin-top: 2rem; gap: 1rem; }
    </style>
</head>
<body>
    <header class="main-header"><div class="container"><div class="header-wrapper"><div class="logo"><a href="home.html"><span class="logo-text">📅 نوبت‌دهی هوشمند</span></a></div><button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button><nav class="main-nav" id="mainNav"><ul class="nav-list"><li><a href="home.html" class="nav-link">خانه</a></li><li><a href="booking.html" class="nav-link active">رزرو نوبت</a></li><li><a href="plans.html" class="nav-link">طرح‌ها</a></li></ul></nav><div class="header-actions"><button class="theme-toggle" id="themeToggle">🌙</button><button class="btn btn-outline" id="loginBtn">ورود</button><button class="btn btn-primary" id="registerBtn">ثبت‌نام</button></div></div></div></header>

    <main><div class="booking-container"><div class="step-indicator"><div class="step" id="step1"><div class="step-number">1</div><div class="step-label">انتخاب سرویس</div></div><div class="step" id="step2"><div class="step-number">2</div><div class="step-label">انتخاب زمان</div></div><div class="step" id="step3"><div class="step-number">3</div><div class="step-label">تکمیل اطلاعات</div></div><div class="step" id="step4"><div class="step-number">4</div><div class="step-label">تأیید نهایی</div></div></div>

        <div id="step1Content" class="booking-step active"><h3>انتخاب کسب‌وکار و خدمت</h3><div class="business-grid" id="businessGrid"></div><div id="servicesContainer" style="display:none"><h4>خدمات</h4><div class="services-grid" id="servicesGrid"></div></div></div>
        <div id="step2Content" class="booking-step"><h3>انتخاب تاریخ و ساعت</h3><div class="form-group"><label>تاریخ</label><input type="date" id="bookingDate" class="form-control"></div><div id="timeSlots" class="time-slots"></div></div>
        <div id="step3Content" class="booking-step"><h3>اطلاعات شما</h3><div class="form-group"><label>نام کامل</label><input type="text" id="customerName" class="form-control"></div><div class="form-group"><label>شماره تماس</label><input type="tel" id="customerPhone" class="form-control"></div><div class="form-group"><label>توضیحات (اختیاری)</label><textarea id="customerNotes" class="form-control" rows="3"></textarea></div></div>
        <div id="step4Content" class="booking-step"><h3>تأیید نهایی</h3><div id="bookingSummary" class="booking-summary"></div></div>

        <div class="booking-actions"><button class="btn btn-outline" id="prevBtn" style="display:none">قبلی</button><button class="btn btn-primary" id="nextBtn">ادامه</button></div>
    </div></main>

    <footer class="main-footer"><div class="container"><div class="footer-grid"><div class="footer-col"><h4>📅 نوبت‌دهی هوشمند</h4><p>پلتفرم پیشرو در ارائه خدمات رزرو آنلاین</p></div></div><div class="footer-bottom"><p>&copy; ۱۴۰۴ تمامی حقوق محفوظ است.</p></div></div></footer>

    <script>
        let currentStep = 1, selectedBusiness = null, selectedService = null, selectedDate = null, selectedTime = null;
        const businesses = [{ id:1, name:'سالن زیبایی لیدا', rating:4.8, address:'تهران، سعادت‌آباد' }, { id:2, name:'کلینیک دکتر محمدی', rating:4.9, address:'تهران، ونک' }];
        const services = [{ id:1, businessId:1, name:'کوتاهی مو', duration:45, price:250000 }, { id:2, businessId:1, name:'رنگ مو', duration:120, price:450000 }, { id:3, businessId:2, name:'ویزیت عمومی', duration:15, price:200000 }];
        const timeSlots = ['09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00'];
        function renderBusinesses() { document.getElementById('businessGrid').innerHTML = businesses.map(b => `<div class="business-card" data-id="${b.id}"><h4>${b.name}</h4><p>⭐ ${b.rating}</p><p>${b.address}</p></div>`).join('');
            document.querySelectorAll('.business-card').forEach(card => card.addEventListener('click', () => { document.querySelectorAll('.business-card').forEach(c=>c.classList.remove('selected')); card.classList.add('selected'); selectedBusiness = businesses.find(b=>b.id==parseInt(card.dataset.id)); renderServices(); document.getElementById('servicesContainer').style.display='block'; })); }
        function renderServices() { const filtered = services.filter(s=>s.businessId===selectedBusiness.id); document.getElementById('servicesGrid').innerHTML = filtered.map(s => `<div class="service-card" data-id="${s.id}"><h4>${s.name}</h4><p>⏱️ ${s.duration} دقیقه</p><p>💰 ${s.price.toLocaleString('fa-IR')} تومان</p></div>`).join('');
            document.querySelectorAll('.service-card').forEach(card => card.addEventListener('click', () => { document.querySelectorAll('.service-card').forEach(c=>c.classList.remove('selected')); card.classList.add('selected'); selectedService = filtered.find(s=>s.id==parseInt(card.dataset.id)); })); }
        function renderTimeSlots() { const container = document.getElementById('timeSlots'); if(!selectedDate) return; container.innerHTML = timeSlots.map(t => `<div class="time-slot" data-time="${t}">${t}</div>`).join('');
            document.querySelectorAll('.time-slot').forEach(slot => slot.addEventListener('click', () => { document.querySelectorAll('.time-slot').forEach(s=>s.classList.remove('selected')); slot.classList.add('selected'); selectedTime = slot.dataset.time; })); }
        function updateSummary() { const summary = document.getElementById('bookingSummary'); summary.innerHTML = `<div class="summary-row"><span>کسب‌وکار:</span><strong>${selectedBusiness?.name}</strong></div><div class="summary-row"><span>خدمت:</span><strong>${selectedService?.name}</strong></div><div class="summary-row"><span>تاریخ:</span><strong>${selectedDate}</strong></div><div class="summary-row"><span>ساعت:</span><strong>${selectedTime}</strong></div><div class="summary-row"><span>مبلغ:</span><strong>${selectedService?.price.toLocaleString('fa-IR')} تومان</strong></div>`; }
        function nextStep() { if(currentStep===1 && !selectedService) { alert('لطفاً کسب‌وکار و خدمت را انتخاب کنید'); return; }
            if(currentStep===2 && (!selectedDate || !selectedTime)) { alert('لطفاً تاریخ و ساعت را انتخاب کنید'); return; }
            if(currentStep===3) { const name=document.getElementById('customerName').value, phone=document.getElementById('customerPhone').value; if(!name||!phone){ alert('لطفاً نام و شماره تماس را وارد کنید'); return; } updateSummary(); }
            document.getElementById(`step${currentStep}Content`).classList.remove('active'); document.getElementById(`step${currentStep}`).classList.remove('active'); currentStep++; if(currentStep>4) { alert('نوبت شما با موفقیت رزرو شد!'); window.location.href='home.html'; return; }
            document.getElementById(`step${currentStep}Content`).classList.add('active'); document.getElementById(`step${currentStep}`).classList.add('active');
            if(currentStep===2 && selectedDate) renderTimeSlots(); if(currentStep>1) document.getElementById('prevBtn').style.display='inline-flex'; if(currentStep===4) document.getElementById('nextBtn').textContent='تأیید نهایی'; }
        function prevStep() { if(currentStep===1) return; document.getElementById(`step${currentStep}Content`).classList.remove('active'); document.getElementById(`step${currentStep}`).classList.remove('active'); currentStep--; document.getElementById(`step${currentStep}Content`).classList.add('active'); document.getElementById(`step${currentStep}`).classList.add('active'); if(currentStep===1) document.getElementById('prevBtn').style.display='none'; if(currentStep!==4) document.getElementById('nextBtn').textContent='ادامه'; }
        document.getElementById('bookingDate').addEventListener('change', (e) => { selectedDate = e.target.value; renderTimeSlots(); });
        document.getElementById('nextBtn').addEventListener('click', nextStep); document.getElementById('prevBtn').addEventListener('click', prevStep);
        renderBusinesses(); renderServices();
        document.getElementById('loginBtn').addEventListener('click', () => window.location.href = '../auth/login.html');
        document.getElementById('registerBtn').addEventListener('click', () => window.location.href = '../auth/register.html');
        const mobileToggle = document.getElementById('mobileMenuToggle'), mainNav = document.getElementById('mainNav');
        mobileToggle?.addEventListener('click', () => mainNav.classList.toggle('active'));
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark-theme'); themeToggle.textContent = '☀️'; }
        themeToggle?.addEventListener('click', () => { const html = document.documentElement; if (html.classList.contains('dark-theme')) { html.classList.remove('dark-theme'); localStorage.setItem('theme', 'light'); themeToggle.textContent = '🌙'; } else { html.classList.add('dark-theme'); localStorage.setItem('theme', 'dark'); themeToggle.textContent = '☀️'; } });
    </script>
</body>
</html>
