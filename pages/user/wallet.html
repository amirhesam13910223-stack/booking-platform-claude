<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کیف پول من | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/layouts/header.css">
    <link rel="stylesheet" href="../../css/layouts/footer.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/components/cards.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .wallet-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .balance-card {
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            border-radius: var(--radius-lg);
            padding: 2rem;
            color: white;
            text-align: center;
            margin-bottom: 2rem;
        }
        .balance-label {
            font-size: 0.875rem;
            opacity: 0.9;
        }
        .balance-amount {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0.5rem 0;
        }
        .balance-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .balance-actions .btn {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .section-title {
            font-size: 1.125rem;
            margin-bottom: 1rem;
        }
        .transaction-list {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .transaction-item:last-child {
            border-bottom: none;
        }
        .transaction-info h4 {
            margin-bottom: 0.25rem;
            font-size: 0.875rem;
        }
        .transaction-date {
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }
        .transaction-amount {
            font-weight: bold;
        }
        .transaction-amount.positive {
            color: var(--color-success);
        }
        .transaction-amount.negative {
            color: var(--color-danger);
        }
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-tertiary);
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="header-wrapper">
                <div class="logo">
                    <a href="../../index.html">
                        <span class="logo-text">📅 نوبت‌دهی هوشمند</span>
                    </a>
                </div>
                <button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button>
                <nav class="main-nav" id="mainNav">
                    <ul class="nav-list">
                        <li><a href="../../index.html" class="nav-link">خانه</a></li>
                        <li><a href="../public/booking.html" class="nav-link">رزرو نوبت</a></li>
                        <li><a href="dashboard.html" class="nav-link">پنل کاربری</a></li>
                        <li><a href="wallet.html" class="nav-link active">کیف پول</a></li>
                    </ul>
                </nav>
                <div class="header-actions">
                    <button class="theme-toggle" id="themeToggle">🌙</button>
                    <button class="btn btn-outline" id="logoutBtn">خروج</button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="wallet-container">
            <div class="balance-card">
                <div class="balance-label">💰 موجودی کیف پول</div>
                <div class="balance-amount" id="balanceAmount">۰ تومان</div>
                <div class="balance-actions">
                    <button class="btn" id="chargeBtn">💳 شارژ کیف پول</button>
                </div>
            </div>

            <div class="section-title">📜 تاریخچه تراکنش‌ها</div>
            <div class="transaction-list" id="transactionsList">
                <div class="empty-state">هیچ تراکنشی یافت نشد</div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h4>📅 نوبت‌دهی هوشمند</h4>
                    <p>پلتفرم پیشرو در ارائه خدمات رزرو آنلاین</p>
                </div>
                <div class="footer-col">
                    <h4>دسترسی سریع</h4>
                    <ul>
                        <li><a href="../../index.html">خانه</a></li>
                        <li><a href="dashboard.html">پنل کاربری</a></li>
                        <li><a href="wallet.html">کیف پول</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; ۱۴۰۴ تمامی حقوق محفوظ است.</p>
            </div>
        </div>
    </footer>

    <script>
        // بررسی لاگین
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
        
        if (!token || !user) {
            window.location.href = '../auth/login.html';
        }
        
        let balance = 0;
        let transactions = [];
        
        function loadWalletData() {
            const savedBalance = localStorage.getItem(`wallet_balance_${user.id}`);
            const savedTransactions = localStorage.getItem(`wallet_transactions_${user.id}`);
            
            balance = savedBalance ? parseInt(savedBalance) : 0;
            transactions = savedTransactions ? JSON.parse(savedTransactions) : [];
            
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('balanceAmount').textContent = balance.toLocaleString('fa-IR') + ' تومان';
            
            const container = document.getElementById('transactionsList');
            if (transactions.length === 0) {
                container.innerHTML = '<div class="empty-state">هیچ تراکنشی یافت نشد</div>';
                return;
            }
            
            container.innerHTML = transactions.map(t => `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <h4>${t.description}</h4>
                        <div class="transaction-date">${new Date(t.date).toLocaleDateString('fa-IR')}</div>
                    </div>
                    <div class="transaction-amount ${t.type === 'charge' ? 'positive' : 'negative'}">
                        ${t.type === 'charge' ? '+' : '-'} ${t.amount.toLocaleString('fa-IR')} تومان
                    </div>
                </div>
            `).join('');
        }
        
        function saveWalletData() {
            localStorage.setItem(`wallet_balance_${user.id}`, balance);
            localStorage.setItem(`wallet_transactions_${user.id}`, JSON.stringify(transactions));
        }
        
        function addTransaction(type, amount, description) {
            transactions.unshift({
                type: type,
                amount: amount,
                description: description,
                date: new Date().toISOString()
            });
            saveWalletData();
            updateUI();
        }
        
        document.getElementById('chargeBtn').addEventListener('click', () => {
            const amount = prompt('مبلغ شارژ را وارد کنید (تومان):', '100000');
            if (amount && !isNaN(amount) && parseInt(amount) > 0) {
                const chargeAmount = parseInt(amount);
                balance += chargeAmount;
                addTransaction('charge', chargeAmount, `شارژ کیف پول به مبلغ ${chargeAmount.toLocaleString('fa-IR')} تومان`);
                saveWalletData();
                updateUI();
                alert(`کیف پول شما با موفقیت به مبلغ ${chargeAmount.toLocaleString('fa-IR')} تومان شارژ شد`);
            } else {
                alert('لطفاً مبلغ معتبر وارد کنید');
            }
        });
        
        loadWalletData();
        
        // خروج
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = '../../index.html';
        });
        
        // منو موبایل
        const mobileToggle = document.getElementById('mobileMenuToggle');
        const mainNav = document.getElementById('mainNav');
        mobileToggle?.addEventListener('click', () => mainNav.classList.toggle('active'));
        
        // تم تاریک/روشن
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-theme');
            themeToggle.textContent = '☀️';
        }
        themeToggle?.addEventListener('click', () => {
            const html = document.documentElement;
            if (html.classList.contains('dark-theme')) {
                html.classList.remove('dark-theme');
                localStorage.setItem('theme', 'light');
                themeToggle.textContent = '🌙';
            } else {
                html.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark');
                themeToggle.textContent = '☀️';
            }
        });
    </script>
</body>
</html>
