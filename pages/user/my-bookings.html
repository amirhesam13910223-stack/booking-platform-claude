<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نوبت‌های من | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/layouts/header.css">
    <link rel="stylesheet" href="../../css/layouts/footer.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/components/cards.css">
    <link rel="stylesheet" href="../../css/components/modals.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .bookings-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .page-header {
            margin-bottom: 2rem;
        }
        .page-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: none;
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .filter-btn.active {
            background: var(--color-primary);
            color: white;
        }
        .bookings-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .booking-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .booking-details h4 {
            margin-bottom: 0.5rem;
        }
        .booking-details p {
            margin: 0.25rem 0;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        .booking-status {
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            display: inline-block;
        }
        .booking-status.confirmed {
            background: var(--color-success-soft);
            color: var(--color-success);
        }
        .booking-status.completed {
            background: var(--color-info-soft);
            color: var(--color-info);
        }
        .booking-status.cancelled {
            background: var(--color-danger-soft);
            color: var(--color-danger);
        }
        .booking-actions {
            display: flex;
            gap: 0.5rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            color: var(--text-tertiary);
        }
        @media (max-width: 640px) {
            .booking-card {
                flex-direction: column;
                text-align: center;
            }
            .booking-actions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="header-wrapper">
                <div class="logo">
                    <a href="../../index.html">
                        <span class="logo-text">📅 نوبت‌دهی هوشمند</span>
                    </a>
                </div>
                <button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button>
                <nav class="main-nav" id="mainNav">
                    <ul class="nav-list">
                        <li><a href="../../index.html" class="nav-link">خانه</a></li>
                        <li><a href="../public/booking.html" class="nav-link">رزرو نوبت</a></li>
                        <li><a href="dashboard.html" class="nav-link">پنل کاربری</a></li>
                        <li><a href="my-bookings.html" class="nav-link active">نوبت‌های من</a></li>
                    </ul>
                </nav>
                <div class="header-actions">
                    <button class="theme-toggle" id="themeToggle">🌙</button>
                    <button class="btn btn-outline" id="logoutBtn">خروج</button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="bookings-container">
            <div class="page-header">
                <h1 class="page-title">📅 نوبت‌های من</h1>
                <p>لیست تمام نوبت‌های ثبت شده شما</p>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">همه</button>
                <button class="filter-btn" data-filter="confirmed">تأیید شده</button>
                <button class="filter-btn" data-filter="completed">انجام شده</button>
                <button class="filter-btn" data-filter="cancelled">لغو شده</button>
            </div>

            <div id="bookingsList" class="bookings-list"></div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h4>📅 نوبت‌دهی هوشمند</h4>
                    <p>پلتفرم پیشرو در ارائه خدمات رزرو آنلاین</p>
                </div>
                <div class="footer-col">
                    <h4>دسترسی سریع</h4>
                    <ul>
                        <li><a href="../../index.html">خانه</a></li>
                        <li><a href="dashboard.html">پنل کاربری</a></li>
                        <li><a href="my-bookings.html">نوبت‌های من</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; ۱۴۰۴ تمامی حقوق محفوظ است.</p>
            </div>
        </div>
    </footer>

    <script>
        // بررسی لاگین
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
        
        if (!token || !user) {
            window.location.href = '../auth/login.html';
        }
        
        // داده‌های نمونه نوبت‌ها
        let bookings = [
            { id: 1, business: 'سالن زیبایی لیدا', service: 'کوتاهی مو زنانه', date: '۱۴۰۳/۱۲/۲۰', time: '۱۶:۰۰', price: 250000, status: 'confirmed', businessPhone: '۰۲۱-۱۲۳۴۵۶۷۸', address: 'تهران، سعادت‌آباد' },
            { id: 2, business: 'کلینیک دکتر محمدی', service: 'ویزیت تخصصی', date: '۱۴۰۳/۱۲/۱۵', time: '۱۰:۳۰', price: 350000, status: 'confirmed', businessPhone: '۰۲۱-۸۷۶۵۴۳۲۱', address: 'تهران، ونک' },
            { id: 3, business: 'آرایشگاه سارا', service: 'اصلاح صورت', date: '۱۴۰۳/۱۲/۱۰', time: '۱۴:۰۰', price: 120000, status: 'completed', businessPhone: '۰۲۱-۴۴۳۳۲۱۱۱', address: 'تهران، جردن' },
            { id: 4, business: 'سالن زیبایی رز', service: 'ماسک مو', date: '۱۴۰۳/۱۲/۰۵', time: '۱۱:۰۰', price: 150000, status: 'cancelled', businessPhone: '۰۲۱-۵۵۴۴۳۲۱۱', address: 'تهران، تجریش' }
        ];
        
        function getStatusText(status) {
            const statusMap = {
                confirmed: 'تأیید شده',
                completed: 'انجام شده',
                cancelled: 'لغو شده'
            };
            return statusMap[status] || status;
        }
        
        function renderBookings(filter = 'all') {
            const filtered = filter === 'all' ? bookings : bookings.filter(b => b.status === filter);
            const container = document.getElementById('bookingsList');
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">هیچ نوبتی یافت نشد</div>';
                return;
            }
            
            container.innerHTML = filtered.map(booking => `
                <div class="booking-card" data-id="${booking.id}">
                    <div class="booking-details">
                        <h4>${booking.business}</h4>
                        <p>${booking.service}</p>
                        <p>📅 ${booking.date} - ⏰ ${booking.time}</p>
                        <p>💰 ${booking.price.toLocaleString('fa-IR')} تومان</p>
                        <p>📍 ${booking.address}</p>
                        <p>📞 ${booking.businessPhone}</p>
                        <span class="booking-status ${booking.status}">${getStatusText(booking.status)}</span>
                    </div>
                    <div class="booking-actions">
                        ${booking.status === 'confirmed' ? `
                            <button class="btn btn-outline btn-sm cancel-booking" data-id="${booking.id}">❌ لغو نوبت</button>
                        ` : ''}
                        <button class="btn btn-outline btn-sm view-details" data-id="${booking.id}">🔍 جزئیات</button>
                    </div>
                </div>
            `).join('');
            
            // رویداد لغو نوبت
            document.querySelectorAll('.cancel-booking').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(e.target.dataset.id);
                    if (confirm('آیا از لغو این نوبت مطمئن هستید؟')) {
                        const index = bookings.findIndex(b => b.id === id);
                        if (index !== -1) {
                            bookings[index].status = 'cancelled';
                            renderBookings(document.querySelector('.filter-btn.active').dataset.filter);
                        }
                    }
                });
            });
            
            // رویداد مشاهده جزئیات
            document.querySelectorAll('.view-details').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(e.target.dataset.id);
                    const booking = bookings.find(b => b.id === id);
                    if (booking) {
                        alert(`جزئیات نوبت:\nکسب‌وکار: ${booking.business}\nخدمت: ${booking.service}\nتاریخ: ${booking.date}\nساعت: ${booking.time}\nمبلغ: ${booking.price.toLocaleString('fa-IR')} تومان\nوضعیت: ${getStatusText(booking.status)}`);
                    }
                });
            });
        }
        
        // فیلترها
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderBookings(btn.dataset.filter);
            });
        });
        
        renderBookings('all');
        
        // خروج
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = '../../index.html';
        });
        
        // منو موبایل
        const mobileToggle = document.getElementById('mobileMenuToggle');
        const mainNav = document.getElementById('mainNav');
        mobileToggle?.addEventListener('click', () => mainNav.classList.toggle('active'));
        
        // تم تاریک/روشن
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-theme');
            themeToggle.textContent = '☀️';
        }
        themeToggle?.addEventListener('click', () => {
            const html = document.documentElement;
            if (html.classList.contains('dark-theme')) {
                html.classList.remove('dark-theme');
                localStorage.setItem('theme', 'light');
                themeToggle.textContent = '🌙';
            } else {
                html.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark');
                themeToggle.textContent = '☀️';
            }
        });
    </script>
</body>
</html>
