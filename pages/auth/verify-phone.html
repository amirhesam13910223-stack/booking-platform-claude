<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأیید شماره تماس | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/components/forms.css">
    <link rel="stylesheet" href="../../css/components/cards.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--color-primary-soft) 0%, var(--bg-secondary) 100%);
            padding: 2rem;
        }
        .auth-card {
            max-width: 450px;
            width: 100%;
            padding: 2rem;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-logo {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .auth-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .auth-subtitle {
            color: var(--text-tertiary);
            font-size: 0.875rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }
        .auth-footer a {
            color: var(--color-primary);
            text-decoration: none;
        }
        .error-message {
            background: var(--color-danger-soft);
            color: var(--color-danger);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
        .success-message {
            background: var(--color-success-soft);
            color: var(--color-success);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
        .otp-inputs {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1rem 0;
        }
        .otp-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
        }
        .timer {
            text-align: center;
            margin: 1rem 0;
            color: var(--text-tertiary);
            font-size: 0.875rem;
        }
        .resend-btn {
            background: none;
            border: none;
            color: var(--color-primary);
            cursor: pointer;
        }
        .resend-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card">
            <div class="auth-header">
                <div class="auth-logo">📅 نوبت‌دهی هوشمند</div>
                <h1 class="auth-title">تأیید شماره تماس</h1>
                <p class="auth-subtitle">کد تأیید به شماره <span id="phoneDisplay"></span> ارسال شد</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <div class="form-group">
                <label>کد تأیید ۶ رقمی</label>
                <div class="otp-inputs" id="otpContainer"></div>
            </div>
            
            <button class="btn btn-primary btn-block" id="verifyBtn">تأیید شماره</button>
            
            <div class="timer" id="timer">۰۲:۰۰</div>
            <div class="text-center">
                <button class="resend-btn" id="resendBtn">ارسال مجدد کد</button>
            </div>
            
            <div class="auth-footer">
                <a href="login.html">بازگشت به صفحه ورود</a>
            </div>
        </div>
    </div>
    
    <script>
        let otpCode = '';
        let timerInterval = null;
        let timeLeft = 120;
        
        const phoneDisplay = document.getElementById('phoneDisplay');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const verifyBtn = document.getElementById('verifyBtn');
        const resendBtn = document.getElementById('resendBtn');
        const timerDisplay = document.getElementById('timer');
        const otpContainer = document.getElementById('otpContainer');
        
        // دریافت شماره تماس از URL
        const urlParams = new URLSearchParams(window.location.search);
        const phone = urlParams.get('phone');
        
        if (phone) {
            phoneDisplay.textContent = phone;
        } else {
            phoneDisplay.textContent = 'نامشخص';
            window.location.href = 'register.html';
        }
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
        
        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }
        
        function createOtpInputs() {
            otpContainer.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = 1;
                input.className = 'otp-input';
                input.setAttribute('data-index', i);
                otpContainer.appendChild(input);
            }
            
            const inputs = otpContainer.querySelectorAll('input');
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.target.value.length === 1 && index < 5) {
                        inputs[index + 1].focus();
                    }
                });
                
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });
            
            inputs[0].focus();
        }
        
        function getOtpValue() {
            const inputs = otpContainer.querySelectorAll('input');
            return Array.from(inputs).map(i => i.value).join('');
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.textContent = '۰۰:۰۰';
                    resendBtn.classList.remove('disabled');
                    resendBtn.disabled = false;
                } else {
                    timeLeft--;
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }
        
        function generateOTP() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }
        
        function sendOtp() {
            otpCode = generateOTP();
            console.log('کد تأیید:', otpCode); // در واقعیت از طریق پیامک ارسال می‌شود
            timeLeft = 120;
            startTimer();
            resendBtn.classList.add('disabled');
            resendBtn.disabled = true;
            showSuccess('کد تأیید مجدد ارسال شد');
        }
        
        async function verifyOtp() {
            const enteredOtp = getOtpValue();
            
            if (enteredOtp.length !== 6) {
                showError('لطفاً کد ۶ رقمی را کامل وارد کنید');
                return;
            }
            
            if (enteredOtp !== otpCode) {
                showError('کد تأیید اشتباه است');
                return;
            }
            
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> در حال تأیید...';
            
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // ذخیره وضعیت تأیید
            localStorage.setItem('phone_verified', 'true');
            localStorage.setItem('verified_phone', phone);
            
            showSuccess('شماره تماس با موفقیت تأیید شد! در حال انتقال...');
            
            setTimeout(() => {
                window.location.href = '../../index.html';
            }, 1500);
        }
        
        createOtpInputs();
        sendOtp();
        
        verifyBtn.addEventListener('click', verifyOtp);
        resendBtn.addEventListener('click', () => {
            if (!resendBtn.disabled) {
                sendOtp();
            }
        });
    </script>
</body>
</html>
