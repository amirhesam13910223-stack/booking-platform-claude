<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فراموشی رمز عبور | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/components/forms.css">
    <link rel="stylesheet" href="../../css/components/cards.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--color-primary-soft) 0%, var(--bg-secondary) 100%);
            padding: 2rem;
        }
        .auth-card {
            max-width: 450px;
            width: 100%;
            padding: 2rem;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-logo {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .auth-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .auth-subtitle {
            color: var(--text-tertiary);
            font-size: 0.875rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }
        .auth-footer a {
            color: var(--color-primary);
            text-decoration: none;
        }
        .error-message {
            background: var(--color-danger-soft);
            color: var(--color-danger);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
        .success-message {
            background: var(--color-success-soft);
            color: var(--color-success);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
        .step {
            display: none;
        }
        .step.active {
            display: block;
        }
        .otp-inputs {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1rem 0;
        }
        .otp-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card">
            <div class="auth-header">
                <div class="auth-logo">📅 نوبت‌دهی هوشمند</div>
                <h1 class="auth-title">بازیابی رمز عبور</h1>
                <p class="auth-subtitle" id="stepDescription">شماره تماس خود را وارد کنید</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <!-- مرحله 1: وارد کردن شماره تماس -->
            <div id="step1" class="step active">
                <div class="form-group">
                    <label>شماره تماس</label>
                    <input type="tel" id="phone" class="form-control" placeholder="۰۹۱۲۱۲۳۴۵۶۷">
                </div>
                <button class="btn btn-primary btn-block" id="sendOtpBtn">ارسال کد تأیید</button>
            </div>
            
            <!-- مرحله 2: وارد کردن کد تأیید -->
            <div id="step2" class="step">
                <div class="form-group">
                    <label>کد تأیید</label>
                    <div class="otp-inputs" id="otpContainer"></div>
                </div>
                <button class="btn btn-primary btn-block" id="verifyOtpBtn">تأیید کد</button>
                <button class="btn btn-outline btn-block" id="resendOtpBtn">ارسال مجدد کد</button>
            </div>
            
            <!-- مرحله 3: تنظیم رمز جدید -->
            <div id="step3" class="step">
                <div class="form-group">
                    <label>رمز عبور جدید</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="حداقل ۶ کاراکتر">
                </div>
                <div class="form-group">
                    <label>تکرار رمز عبور جدید</label>
                    <input type="password" id="confirmNewPassword" class="form-control" placeholder="تکرار رمز عبور">
                </div>
                <button class="btn btn-primary btn-block" id="resetPasswordBtn">تغییر رمز عبور</button>
            </div>
            
            <div class="auth-footer">
                <a href="login.html">بازگشت به صفحه ورود</a>
            </div>
        </div>
    </div>
    
    <script>
        let currentStep = 1;
        let userPhone = '';
        let otpCode = '';
        
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');
        const stepDescription = document.getElementById('stepDescription');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const otpContainer = document.getElementById('otpContainer');
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
        
        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }
        
        function createOtpInputs() {
            otpContainer.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = 1;
                input.className = 'otp-input';
                input.setAttribute('data-index', i);
                otpContainer.appendChild(input);
            }
            
            const inputs = otpContainer.querySelectorAll('input');
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.target.value.length === 1 && index < 5) {
                        inputs[index + 1].focus();
                    }
                });
                
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });
            
            inputs[0].focus();
        }
        
        function getOtpValue() {
            const inputs = otpContainer.querySelectorAll('input');
            return Array.from(inputs).map(i => i.value).join('');
        }
        
        async function goToStep(step) {
            currentStep = step;
            step1.classList.remove('active');
            step2.classList.remove('active');
            step3.classList.remove('active');
            
            if (step === 1) {
                step1.classList.add('active');
                stepDescription.textContent = 'شماره تماس خود را وارد کنید';
            } else if (step === 2) {
                step2.classList.add('active');
                stepDescription.textContent = 'کد تأیید ارسال شده را وارد کنید';
                createOtpInputs();
            } else if (step === 3) {
                step3.classList.add('active');
                stepDescription.textContent = 'رمز عبور جدید خود را وارد کنید';
            }
        }
        
        document.getElementById('sendOtpBtn').addEventListener('click', async () => {
            const phone = document.getElementById('phone').value.trim();
            
            if (!phone) {
                showError('لطفاً شماره تماس را وارد کنید');
                return;
            }
            
            const phoneRegex = /^09[0-9]{9}$/;
            if (!phoneRegex.test(phone)) {
                showError('شماره تماس معتبر نیست');
                return;
            }
            
            userPhone = phone;
            
            // شبیه‌سازی ارسال کد
            otpCode = Math.floor(100000 + Math.random() * 900000).toString();
            console.log('کد تأیید:', otpCode); // در واقعیت از طریق پیامک ارسال می‌شود
            
            showSuccess('کد تأیید به شماره شما ارسال شد');
            await goToStep(2);
        });
        
        document.getElementById('verifyOtpBtn').addEventListener('click', async () => {
            const enteredOtp = getOtpValue();
            
            if (enteredOtp.length !== 6) {
                showError('لطفاً کد ۶ رقمی را کامل وارد کنید');
                return;
            }
            
            if (enteredOtp !== otpCode) {
                showError('کد تأیید اشتباه است');
                return;
            }
            
            showSuccess('کد تأیید شد');
            await goToStep(3);
        });
        
        document.getElementById('resendOtpBtn').addEventListener('click', async () => {
            otpCode = Math.floor(100000 + Math.random() * 900000).toString();
            console.log('کد تأیید جدید:', otpCode);
            showSuccess('کد تأیید مجدد ارسال شد');
        });
        
        document.getElementById('resetPasswordBtn').addEventListener('click', async () => {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;
            
            if (!newPassword) {
                showError('لطفاً رمز عبور جدید را وارد کنید');
                return;
            }
            
            if (newPassword.length < 6) {
                showError('رمز عبور باید حداقل ۶ کاراکتر باشد');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showError('رمز عبور و تکرار آن مطابقت ندارند');
                return;
            }
            
            // شبیه‌سازی تغییر رمز
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            showSuccess('رمز عبور با موفقیت تغییر کرد! در حال انتقال...');
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        });
        
        // بررسی توکن موجود
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        if (token) {
            window.location.href = '../../index.html';
        }
    </script>
</body>
</html>
