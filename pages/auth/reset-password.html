<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنظیم رمز عبور جدید | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/components/forms.css">
    <link rel="stylesheet" href="../../css/components/cards.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--color-primary-soft) 0%, var(--bg-secondary) 100%);
            padding: 2rem;
        }
        .auth-card {
            max-width: 450px;
            width: 100%;
            padding: 2rem;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-logo {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .auth-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .auth-subtitle {
            color: var(--text-tertiary);
            font-size: 0.875rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }
        .auth-footer a {
            color: var(--color-primary);
            text-decoration: none;
        }
        .error-message {
            background: var(--color-danger-soft);
            color: var(--color-danger);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
        .success-message {
            background: var(--color-success-soft);
            color: var(--color-success);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
        }
        .password-strength-bar {
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
        }
        .reset-info {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card">
            <div class="auth-header">
                <div class="auth-logo">📅 نوبت‌دهی هوشمند</div>
                <h1 class="auth-title">تنظیم رمز عبور جدید</h1>
                <p class="auth-subtitle">رمز عبور جدید خود را وارد کنید</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <div class="reset-info">
                🔐 در حال تغییر رمز عبور برای شماره <span id="phoneDisplay"></span>
            </div>
            
            <form id="resetForm">
                <div class="form-group">
                    <label>رمز عبور جدید</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="حداقل ۶ کاراکتر">
                    <div class="password-strength">
                        <div class="password-strength-bar" id="passwordStrength"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>تکرار رمز عبور جدید</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="تکرار رمز عبور">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">تغییر رمز عبور</button>
                
                <div class="auth-footer">
                    <a href="login.html">بازگشت به صفحه ورود</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('resetForm');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const phoneDisplay = document.getElementById('phoneDisplay');
        const passwordStrength = document.getElementById('passwordStrength');
        
        // دریافت شماره تماس از URL
        const urlParams = new URLSearchParams(window.location.search);
        const phone = urlParams.get('phone');
        const token = urlParams.get('token');
        
        if (phone) {
            phoneDisplay.textContent = phone;
        } else {
            phoneDisplay.textContent = 'نامشخص';
        }
        
        if (!token) {
            showError('لینک نامعتبر است');
            setTimeout(() => {
                window.location.href = 'forgot-password.html';
            }, 2000);
        }
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
        
        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }
        
        function checkPasswordStrength(password) {
            let strength = 0;
            let color = '';
            
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            if (strength <= 2) color = '#EF4444';
            else if (strength <= 4) color = '#F59E0B';
            else color = '#10B981';
            
            passwordStrength.style.width = `${(strength / 6) * 100}%`;
            passwordStrength.style.backgroundColor = color;
        }
        
        function validateForm() {
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (!newPassword) {
                showError('لطفاً رمز عبور جدید را وارد کنید');
                newPasswordInput.focus();
                return false;
            }
            
            if (newPassword.length < 6) {
                showError('رمز عبور باید حداقل ۶ کاراکتر باشد');
                newPasswordInput.focus();
                return false;
            }
            
            if (newPassword !== confirmPassword) {
                showError('رمز عبور و تکرار آن مطابقت ندارند');
                confirmPasswordInput.focus();
                return false;
            }
            
            return true;
        }
        
        async function handleReset(e) {
            e.preventDefault();
            
            if (!validateForm()) return;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> در حال تغییر...';
            
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            showSuccess('رمز عبور با موفقیت تغییر کرد! در حال انتقال...');
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        }
        
        newPasswordInput.addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
        });
        
        form.addEventListener('submit', handleReset);
    </script>
</body>
</html>
