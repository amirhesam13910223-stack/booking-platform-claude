<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به حساب کاربری | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/components/forms.css">
    <link rel="stylesheet" href="../../css/components/cards.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--color-primary-soft) 0%, var(--bg-secondary) 100%);
            padding: 2rem;
        }
        .auth-card {
            max-width: 450px;
            width: 100%;
            padding: 2rem;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-logo {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .auth-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .auth-subtitle {
            color: var(--text-tertiary);
            font-size: 0.875rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }
        .auth-footer a {
            color: var(--color-primary);
            text-decoration: none;
        }
        .error-message {
            background: var(--color-danger-soft);
            color: var(--color-danger);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
        .success-message {
            background: var(--color-success-soft);
            color: var(--color-success);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card">
            <div class="auth-header">
                <div class="auth-logo">📅 نوبت‌دهی هوشمند</div>
                <h1 class="auth-title">ورود به حساب کاربری</h1>
                <p class="auth-subtitle">خوش آمدید! لطفاً اطلاعات خود را وارد کنید</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>شماره تماس یا ایمیل</label>
                    <input type="text" id="username" class="form-control" placeholder="example@gmail.com یا ۰۹۱۲۱۲۳۴۵۶۷" autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label>رمز عبور</label>
                    <input type="password" id="password" class="form-control" placeholder="********">
                </div>
                
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe"> مرا به خاطر بسپار
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">ورود</button>
                
                <div class="auth-footer">
                    <a href="forgot-password.html">فراموشی رمز عبور؟</a>
                    &nbsp;|&nbsp;
                    <a href="register.html">ثبت‌نام نکرده‌اید؟</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const rememberCheckbox = document.getElementById('rememberMe');
        const submitBtn = document.getElementById('submitBtn');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
        
        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }
        
        function validateForm() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            if (!username) {
                showError('لطفاً نام کاربری یا ایمیل را وارد کنید');
                return false;
            }
            
            if (!password) {
                showError('لطفاً رمز عبور را وارد کنید');
                return false;
            }
            
            if (password.length < 6) {
                showError('رمز عبور باید حداقل ۶ کاراکتر باشد');
                return false;
            }
            
            return true;
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            
            if (!validateForm()) return;
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const remember = rememberCheckbox.checked;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> در حال ورود...';
            
            // شبیه‌سازی درخواست به سرور
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // بررسی اعتبار (دمو)
            const isValid = (username === '09121234567' || username === 'test@example.com') && password === '123456';
            
            if (isValid) {
                const user = {
                    id: 1,
                    name: 'کاربر تست',
                    email: username.includes('@') ? username : 'test@example.com',
                    phone: username.includes('@') ? '09121234567' : username,
                    role: 'user'
                };
                
                if (remember) {
                    localStorage.setItem('auth_token', 'demo_token_' + Date.now());
                    localStorage.setItem('user', JSON.stringify(user));
                } else {
                    sessionStorage.setItem('auth_token', 'demo_token_' + Date.now());
                    sessionStorage.setItem('user', JSON.stringify(user));
                }
                
                showSuccess('ورود با موفقیت انجام شد! در حال انتقال...');
                
                setTimeout(() => {
                    window.location.href = '../../index.html';
                }, 1500);
            } else {
                showError('نام کاربری یا رمز عبور اشتباه است');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'ورود';
            }
        }
        
        form.addEventListener('submit', handleLogin);
        
        // بارگذاری اطلاعات ذخیره شده
        const savedUsername = localStorage.getItem('saved_username');
        if (savedUsername) {
            usernameInput.value = savedUsername;
            rememberCheckbox.checked = true;
        }
        
        // بررسی توکن موجود
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        if (token) {
            window.location.href = '../../index.html';
        }
    </script>
</body>
</html>
