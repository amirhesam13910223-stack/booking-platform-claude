<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت کاربران | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/layouts/header.css">
    <link rel="stylesheet" href="../../css/layouts/footer.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .container-page { max-width: 1400px; margin: 2rem auto; padding: 0 1rem; }
        .filters { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .search-input { flex: 1; min-width: 200px; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--input-bg); }
        .filter-select { padding: 0.5rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--input-bg); }
        .users-table { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: right; border-bottom: 1px solid var(--border-color); }
        th { background: var(--bg-secondary); font-weight: 600; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; margin: 0 0.25rem; }
        .status-badge { padding: 0.25rem 0.5rem; border-radius: var(--radius-full); font-size: 0.75rem; }
        .status-active { background: var(--color-success-soft); color: var(--color-success); }
        .status-blocked { background: var(--color-danger-soft); color: var(--color-danger); }
    </style>
</head>
<body>
    <header class="main-header"><div class="container"><div class="header-wrapper"><div class="logo"><a href="../../index.html"><span class="logo-text">📅 نوبت‌دهی هوشمند</span></a></div><button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button><nav class="main-nav" id="mainNav"><ul class="nav-list"><li><a href="../../index.html" class="nav-link">خانه</a></li><li><a href="dashboard.html" class="nav-link">داشبورد</a></li><li><a href="users.html" class="nav-link active">کاربران</a></li></ul></nav><div class="header-actions"><button class="theme-toggle" id="themeToggle">🌙</button><button class="btn btn-outline" id="logoutBtn">خروج</button></div></div></div></header>

    <main><div class="container-page">
        <h1 style="margin-bottom: 1.5rem;">👥 مدیریت کاربران</h1>
        <div class="filters"><input type="text" id="searchInput" class="search-input" placeholder="جستجوی نام یا شماره تماس..."><select id="roleFilter" class="filter-select"><option value="all">همه نقش‌ها</option><option value="user">کاربر</option><option value="business">کسب‌وکار</option><option value="admin">ادمین</option></select><select id="statusFilter" class="filter-select"><option value="all">همه وضعیت‌ها</option><option value="active">فعال</option><option value="blocked">مسدود</option></select></div>
        <div class="users-table"><table><thead><tr><th>نام</th><th>شماره تماس</th><th>ایمیل</th><th>نقش</th><th>وضعیت</th><th>تاریخ عضویت</th><th>عملیات</th></tr></thead><tbody id="usersBody"></tbody></table></div>
    </div></main>

    <footer class="main-footer"><div class="container"><div class="footer-grid"><div class="footer-col"><h4>📅 نوبت‌دهی هوشمند</h4><p>پلتفرم پیشرو در ارائه خدمات رزرو آنلاین</p></div></div><div class="footer-bottom"><p>&copy; ۱۴۰۴ تمامی حقوق محفوظ است.</p></div></div></footer>

    <script>
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
        if (!token || !user || user.role !== 'admin') { window.location.href = '../auth/login.html'; }
        let users = [{ id:1, name:'سارا محمدی', phone:'09121234567', email:'sara@test.com', role:'user', status:'active', date:'۱۴۰۳/۱۲/۰۱' }, { id:2, name:'سالن زیبایی لیدا', phone:'02112345678', email:'lida@test.com', role:'business', status:'active', date:'۱۴۰۳/۱۲/۰۵' }, { id:3, name:'مریم احمدی', phone:'09129876543', email:'maryam@test.com', role:'user', status:'blocked', date:'۱۴۰۳/۱۲/۱۰' }];
        function renderUsers() { const search = document.getElementById('searchInput').value.toLowerCase(); const role = document.getElementById('roleFilter').value; const status = document.getElementById('statusFilter').value; let filtered = users.filter(u => (u.name.toLowerCase().includes(search) || u.phone.includes(search)) && (role === 'all' || u.role === role) && (status === 'all' || u.status === status));
            document.getElementById('usersBody').innerHTML = filtered.map(u => `<tr><td>${u.name}</td><td>${u.phone}</td><td>${u.email}</td><td>${u.role === 'user' ? 'کاربر' : u.role === 'business' ? 'کسب‌وکار' : 'ادمین'}</td><td><span class="status-badge ${u.status === 'active' ? 'status-active' : 'status-blocked'}">${u.status === 'active' ? 'فعال' : 'مسدود'}</span></td><td>${u.date}</td><td><button class="action-btn block-user" data-id="${u.id}" title="مسدود">🔴</button><button class="action-btn delete-user" data-id="${u.id}" title="حذف">🗑️</button></td></tr>`).join('');
            document.querySelectorAll('.block-user').forEach(btn => btn.addEventListener('click', (e) => { let id = parseInt(e.target.dataset.id); let idx = users.findIndex(u=>u.id===id); if(idx!==-1){ users[idx].status = users[idx].status === 'active' ? 'blocked' : 'active'; renderUsers(); } }));
            document.querySelectorAll('.delete-user').forEach(btn => btn.addEventListener('click', (e) => { let id = parseInt(e.target.dataset.id); if(confirm('حذف شود؟')){ users = users.filter(u=>u.id!==id); renderUsers(); } })); }
        document.getElementById('searchInput').addEventListener('input', renderUsers); document.getElementById('roleFilter').addEventListener('change', renderUsers); document.getElementById('statusFilter').addEventListener('change', renderUsers); renderUsers();
        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); sessionStorage.clear(); window.location.href = '../../index.html'; });
        const mobileToggle = document.getElementById('mobileMenuToggle'), mainNav = document.getElementById('mainNav');
        mobileToggle?.addEventListener('click', () => mainNav.classList.toggle('active'));
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark-theme'); themeToggle.textContent = '☀️'; }
        themeToggle?.addEventListener('click', () => { const html = document.documentElement; if (html.classList.contains('dark-theme')) { html.classList.remove('dark-theme'); localStorage.setItem('theme', 'light'); themeToggle.textContent = '🌙'; } else { html.classList.add('dark-theme'); localStorage.setItem('theme', 'dark'); themeToggle.textContent = '☀️'; } });
    </script>
</body>
</html>
