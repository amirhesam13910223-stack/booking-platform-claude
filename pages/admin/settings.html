<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنظیمات سیستم | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/layouts/header.css">
    <link rel="stylesheet" href="../../css/layouts/footer.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/components/forms.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .container-page { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .settings-section { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <header class="main-header"><div class="container"><div class="header-wrapper"><div class="logo"><a href="../../index.html"><span class="logo-text">📅 نوبت‌دهی هوشمند</span></a></div><button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button><nav class="main-nav" id="mainNav"><ul class="nav-list"><li><a href="../../index.html" class="nav-link">خانه</a></li><li><a href="dashboard.html" class="nav-link">داشبورد</a></li><li><a href="settings.html" class="nav-link active">تنظیمات</a></li></ul></nav><div class="header-actions"><button class="theme-toggle" id="themeToggle">🌙</button><button class="btn btn-outline" id="logoutBtn">خروج</button></div></div></div></header>

    <main><div class="container-page">
        <h1 style="margin-bottom: 1.5rem;">⚙️ تنظیمات سیستم</h1>
        <div class="settings-section"><h3>💰 تنظیمات کارمزد</h3><div class="form-group"><label>نرخ کارمزد (%)</label><input type="number" id="commissionRate" class="form-control" value="3" step="0.5"></div><div class="form-group"><label>حداقل کارمزد (تومان)</label><input type="number" id="minCommission" class="form-control" value="1000"></div><button class="btn btn-primary" id="saveCommissionBtn">ذخیره</button></div>
        <div class="settings-section"><h3>📅 تنظیمات نوبت</h3><div class="form-group"><label>حداکثر روز قبل برای رزرو</label><input type="number" id="maxAdvanceDays" class="form-control" value="30"></div><div class="form-group"><label>جریمه کنسلی (%)</label><input type="number" id="cancellationFee" class="form-control" value="25"></div><button class="btn btn-primary" id="saveBookingSettingsBtn">ذخیره</button></div>
        <div class="settings-section"><h3>🔔 تنظیمات اعلانات</h3><div class="form-group"><label class="checkbox-label"><input type="checkbox" id="smsEnabled" checked> فعال بودن پیامک</label></div><div class="form-group"><label class="checkbox-label"><input type="checkbox" id="emailEnabled" checked> فعال بودن ایمیل</label></div><button class="btn btn-primary" id="saveNotificationBtn">ذخیره</button></div>
    </div></main>

    <footer class="main-footer"><div class="container"><div class="footer-grid"><div class="footer-col"><h4>📅 نوبت‌دهی هوشمند</h4><p>پلتفرم پیشرو در ارائه خدمات رزرو آنلاین</p></div></div><div class="footer-bottom"><p>&copy; ۱۴۰۴ تمامی حقوق محفوظ است.</p></div></div></footer>

    <script>
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
        if (!token || !user || user.role !== 'admin') { window.location.href = '../auth/login.html'; }
        document.getElementById('saveCommissionBtn').addEventListener('click', () => { alert('تنظیمات کارمزد ذخیره شد'); });
        document.getElementById('saveBookingSettingsBtn').addEventListener('click', () => { alert('تنظیمات نوبت ذخیره شد'); });
        document.getElementById('saveNotificationBtn').addEventListener('click', () => { alert('تنظیمات اعلانات ذخیره شد'); });
        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); sessionStorage.clear(); window.location.href = '../../index.html'; });
        const mobileToggle = document.getElementById('mobileMenuToggle'), mainNav = document.getElementById('mainNav');
        mobileToggle?.addEventListener('click', () => mainNav.classList.toggle('active'));
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark-theme'); themeToggle.textContent = '☀️'; }
        themeToggle?.addEventListener('click', () => { const html = document.documentElement; if (html.classList.contains('dark-theme')) { html.classList.remove('dark-theme'); localStorage.setItem('theme', 'light'); themeToggle.textContent = '🌙'; } else { html.classList.add('dark-theme'); localStorage.setItem('theme', 'dark'); themeToggle.textContent = '☀️'; } });
    </script>
</body>
</html>
