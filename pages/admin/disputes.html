<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختلافات | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/layouts/header.css">
    <link rel="stylesheet" href="../../css/layouts/footer.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/components/cards.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .container-page { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .dispute-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
        .dispute-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .dispute-title { font-weight: bold; }
        .priority-high { color: var(--color-danger); }
        .priority-medium { color: var(--color-warning); }
        .priority-low { color: var(--color-info); }
        .status-badge { padding: 0.25rem 0.5rem; border-radius: var(--radius-full); font-size: 0.75rem; }
        .status-open { background: var(--color-danger-soft); color: var(--color-danger); }
        .status-resolved { background: var(--color-success-soft); color: var(--color-success); }
        .dispute-actions { margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: flex-end; }
    </style>
</head>
<body>
    <header class="main-header"><div class="container"><div class="header-wrapper"><div class="logo"><a href="../../index.html"><span class="logo-text">📅 نوبت‌دهی هوشمند</span></a></div><button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button><nav class="main-nav" id="mainNav"><ul class="nav-list"><li><a href="../../index.html" class="nav-link">خانه</a></li><li><a href="dashboard.html" class="nav-link">داشبورد</a></li><li><a href="disputes.html" class="nav-link active">اختلافات</a></li></ul></nav><div class="header-actions"><button class="theme-toggle" id="themeToggle">🌙</button><button class="btn btn-outline" id="logoutBtn">خروج</button></div></div></div></header>

    <main><div class="container-page">
        <h1 style="margin-bottom: 1.5rem;">⚖️ اختلافات</h1>
        <div id="disputesList"></div>
    </div></main>

    <footer class="main-footer"><div class="container"><div class="footer-grid"><div class="footer-col"><h4>📅 نوبت‌دهی هوشمند</h4><p>پلتفرم پیشرو در ارائه خدمات رزرو آنلاین</p></div></div><div class="footer-bottom"><p>&copy; ۱۴۰۴ تمامی حقوق محفوظ است.</p></div></div></footer>

    <script>
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
        if (!token || !user || user.role !== 'admin') { window.location.href = '../auth/login.html'; }
        let disputes = [{ id:1, title:'عدم ارائه خدمت', reporter:'سارا محمدی', respondent:'سالن زیبایی لیدا', priority:'high', status:'open', date:'۱۴۰۳/۱۲/۱۰' }, { id:2, title:'مشکل پرداخت', reporter:'کلینیک دکتر محمدی', respondent:'رضا کریمی', priority:'medium', status:'open', date:'۱۴۰۳/۱۲/۱۲' }];
        function renderDisputes() { document.getElementById('disputesList').innerHTML = disputes.map(d => `<div class="dispute-card"><div class="dispute-header"><span class="dispute-title">${d.title}</span><span class="priority-${d.priority}">${d.priority === 'high' ? 'بالا' : d.priority === 'medium' ? 'متوسط' : 'پایین'}</span><span class="status-badge status-${d.status}">${d.status === 'open' ? 'باز' : 'حل شده'}</span></div><p>گزارش‌دهنده: ${d.reporter} | طرف مقابل: ${d.respondent}</p><p>تاریخ: ${d.date}</p><div class="dispute-actions"><button class="btn btn-primary btn-sm resolve-dispute" data-id="${d.id}">حل اختلاف</button><button class="btn btn-outline btn-sm view-details" data-id="${d.id}">مشاهده جزئیات</button></div></div>`).join('');
            document.querySelectorAll('.resolve-dispute').forEach(btn => btn.addEventListener('click', (e) => { let id = parseInt(e.target.dataset.id); let idx = disputes.findIndex(d=>d.id===id); if(idx!==-1){ disputes[idx].status='resolved'; renderDisputes(); alert('اختلاف با موفقیت حل شد'); } })); }
        renderDisputes();
        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); sessionStorage.clear(); window.location.href = '../../index.html'; });
        const mobileToggle = document.getElementById('mobileMenuToggle'), mainNav = document.getElementById('mainNav');
        mobileToggle?.addEventListener('click', () => mainNav.classList.toggle('active'));
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark-theme'); themeToggle.textContent = '☀️'; }
        themeToggle?.addEventListener('click', () => { const html = document.documentElement; if (html.classList.contains('dark-theme')) { html.classList.remove('dark-theme'); localStorage.setItem('theme', 'light'); themeToggle.textContent = '🌙'; } else { html.classList.add('dark-theme'); localStorage.setItem('theme', 'dark'); themeToggle.textContent = '☀️'; } });
    </script>
</body>
</html>
