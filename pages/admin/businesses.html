<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت کسب‌وکارها | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/layouts/header.css">
    <link rel="stylesheet" href="../../css/layouts/footer.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .container-page { max-width: 1400px; margin: 2rem auto; padding: 0 1rem; }
        .filters { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .search-input { flex: 1; min-width: 200px; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); }
        .businesses-table { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: right; border-bottom: 1px solid var(--border-color); }
        th { background: var(--bg-secondary); font-weight: 600; }
        .status-badge { padding: 0.25rem 0.5rem; border-radius: var(--radius-full); font-size: 0.75rem; }
        .status-verified { background: var(--color-success-soft); color: var(--color-success); }
        .status-pending { background: var(--color-warning-soft); color: var(--color-warning); }
        .status-rejected { background: var(--color-danger-soft); color: var(--color-danger); }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; margin: 0 0.25rem; }
    </style>
</head>
<body>
    <header class="main-header"><div class="container"><div class="header-wrapper"><div class="logo"><a href="../../index.html"><span class="logo-text">📅 نوبت‌دهی هوشمند</span></a></div><button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button><nav class="main-nav" id="mainNav"><ul class="nav-list"><li><a href="../../index.html" class="nav-link">خانه</a></li><li><a href="dashboard.html" class="nav-link">داشبورد</a></li><li><a href="businesses.html" class="nav-link active">کسب‌وکارها</a></li></ul></nav><div class="header-actions"><button class="theme-toggle" id="themeToggle">🌙</button><button class="btn btn-outline" id="logoutBtn">خروج</button></div></div></div></header>

    <main><div class="container-page">
        <h1 style="margin-bottom: 1.5rem;">🏢 مدیریت کسب‌وکارها</h1>
        <div class="filters"><input type="text" id="searchInput" class="search-input" placeholder="جستجوی نام کسب‌وکار..."><select id="statusFilter" class="filter-select"><option value="all">همه وضعیت‌ها</option><option value="pending">در انتظار</option><option value="verified">تأیید شده</option><option value="rejected">رد شده</option></select></div>
        <div class="businesses-table"><table><thead><tr><th>نام کسب‌وکار</th><th>مالک</th><th>شماره تماس</th><th>ایمیل</th><th>وضعیت</th><th>تاریخ ثبت</th><th>عملیات</th></tr></thead><tbody id="businessesBody"></tbody></table></div>
    </div></main>

    <footer class="main-footer"><div class="container"><div class="footer-grid"><div class="footer-col"><h4>📅 نوبت‌دهی هوشمند</h4><p>پلتفرم پیشرو در ارائه خدمات رزرو آنلاین</p></div></div><div class="footer-bottom"><p>&copy; ۱۴۰۴ تمامی حقوق محفوظ است.</p></div></div></footer>

    <script>
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
        if (!token || !user || user.role !== 'admin') { window.location.href = '../auth/login.html'; }
        let businesses = [{ id:1, name:'سالن زیبایی لیدا', owner:'مریم احمدی', phone:'02112345678', email:'lida@test.com', status:'verified', date:'۱۴۰۳/۱۲/۰۱' }, { id:2, name:'کلینیک دکتر محمدی', owner:'دکتر محمدی', phone:'02187654321', email:'dr@test.com', status:'pending', date:'۱۴۰۳/۱۲/۱۰' }];
        function renderBusinesses() { const search = document.getElementById('searchInput').value.toLowerCase(); const status = document.getElementById('statusFilter').value; let filtered = businesses.filter(b => b.name.toLowerCase().includes(search) && (status === 'all' || b.status === status));
            document.getElementById('businessesBody').innerHTML = filtered.map(b => `<tr><td>${b.name}</td><td>${b.owner}</td><td>${b.phone}</td><td>${b.email}</td><td><span class="status-badge status-${b.status}">${b.status === 'verified' ? 'تأیید شده' : b.status === 'pending' ? 'در انتظار' : 'رد شده'}</span></td><td>${b.date}</td><td>${b.status === 'pending' ? '<button class="action-btn verify-business" data-id="'+b.id+'">✅</button><button class="action-btn reject-business" data-id="'+b.id+'">❌</button>' : ''}</td></tr>`).join('');
            document.querySelectorAll('.verify-business').forEach(btn => btn.addEventListener('click', (e) => { let id = parseInt(e.target.dataset.id); let idx = businesses.findIndex(b=>b.id===id); if(idx!==-1){ businesses[idx].status='verified'; renderBusinesses(); } }));
            document.querySelectorAll('.reject-business').forEach(btn => btn.addEventListener('click', (e) => { let id = parseInt(e.target.dataset.id); let idx = businesses.findIndex(b=>b.id===id); if(idx!==-1){ businesses[idx].status='rejected'; renderBusinesses(); } })); }
        document.getElementById('searchInput').addEventListener('input', renderBusinesses); document.getElementById('statusFilter').addEventListener('change', renderBusinesses); renderBusinesses();
        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); sessionStorage.clear(); window.location.href = '../../index.html'; });
        const mobileToggle = document.getElementById('mobileMenuToggle'), mainNav = document.getElementById('mainNav');
        mobileToggle?.addEventListener('click', () => mainNav.classList.toggle('active'));
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark-theme'); themeToggle.textContent = '☀️'; }
        themeToggle?.addEventListener('click', () => { const html = document.documentElement; if (html.classList.contains('dark-theme')) { html.classList.remove('dark-theme'); localStorage.setItem('theme', 'light'); themeToggle.textContent = '🌙'; } else { html.classList.add('dark-theme'); localStorage.setItem('theme', 'dark'); themeToggle.textContent = '☀️'; } });
    </script>
</body>
</html>
