<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گزارشات کل | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/layouts/header.css">
    <link rel="stylesheet" href="../../css/layouts/footer.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .container-page { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .report-filters { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; align-items: flex-end; }
        .report-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; }
        .stats-row { display: flex; justify-content: space-around; text-align: center; flex-wrap: wrap; }
        .stat { flex: 1; min-width: 120px; margin: 0.5rem; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--color-primary); }
        .export-buttons { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem; }
    </style>
</head>
<body>
    <header class="main-header"><div class="container"><div class="header-wrapper"><div class="logo"><a href="../../index.html"><span class="logo-text">📅 نوبت‌دهی هوشمند</span></a></div><button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button><nav class="main-nav" id="mainNav"><ul class="nav-list"><li><a href="../../index.html" class="nav-link">خانه</a></li><li><a href="dashboard.html" class="nav-link">داشبورد</a></li><li><a href="reports.html" class="nav-link active">گزارشات</a></li></ul></nav><div class="header-actions"><button class="theme-toggle" id="themeToggle">🌙</button><button class="btn btn-outline" id="logoutBtn">خروج</button></div></div></div></header>

    <main><div class="container-page">
        <h1 style="margin-bottom: 1.5rem;">📊 گزارشات کل</h1>
        <div class="report-filters"><div><label>از تاریخ</label><input type="date" id="startDate" class="form-control"></div><div><label>تا تاریخ</label><input type="date" id="endDate" class="form-control"></div><button class="btn btn-primary" id="generateBtn">تولید گزارش</button></div>
        <div id="reportContainer"><div class="report-card"><div class="stats-row"><div class="stat"><div class="stat-value" id="totalUsers">۱,۲۴۷</div><div>کل کاربران</div></div><div class="stat"><div class="stat-value" id="newUsers">۰</div><div>کاربران جدید</div></div><div class="stat"><div class="stat-value" id="totalBookings">۱۲,۴۵۰</div><div>کل نوبت‌ها</div></div><div class="stat"><div class="stat-value" id="totalRevenue">۱۲۴,۵۰۰,۰۰۰</div><div>درآمد کل</div></div></div></div></div>
    </div></main>

    <footer class="main-footer"><div class="container"><div class="footer-grid"><div class="footer-col"><h4>📅 نوبت‌دهی هوشمند</h4><p>پلتفرم پیشرو در ارائه خدمات رزرو آنلاین</p></div></div><div class="footer-bottom"><p>&copy; ۱۴۰۴ تمامی حقوق محفوظ است.</p></div></div></footer>

    <script>
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
        if (!token || !user || user.role !== 'admin') { window.location.href = '../auth/login.html'; }
        document.getElementById('generateBtn').addEventListener('click', () => { document.getElementById('newUsers').textContent = '۴۵'; });
        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); sessionStorage.clear(); window.location.href = '../../index.html'; });
        const mobileToggle = document.getElementById('mobileMenuToggle'), mainNav = document.getElementById('mainNav');
        mobileToggle?.addEventListener('click', () => mainNav.classList.toggle('active'));
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark-theme'); themeToggle.textContent = '☀️'; }
        themeToggle?.addEventListener('click', () => { const html = document.documentElement; if (html.classList.contains('dark-theme')) { html.classList.remove('dark-theme'); localStorage.setItem('theme', 'light'); themeToggle.textContent = '🌙'; } else { html.classList.add('dark-theme'); localStorage.setItem('theme', 'dark'); themeToggle.textContent = '☀️'; } });
    </script>
</body>
</html>
