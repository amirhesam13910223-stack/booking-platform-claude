<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آمار پلتفرم | پلتفرم نوبت‌دهی هوشمند</title>
    <link rel="stylesheet" href="../../css/core/reset.css">
    <link rel="stylesheet" href="../../css/core/variables.css">
    <link rel="stylesheet" href="../../css/core/typography.css">
    <link rel="stylesheet" href="../../css/themes/light-theme.css">
    <link rel="stylesheet" href="../../css/layouts/header.css">
    <link rel="stylesheet" href="../../css/layouts/footer.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/responsive/mobile.css">
    <style>
        .container-page { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.5rem; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--color-primary); }
        .stat-label { font-size: 0.875rem; color: var(--text-tertiary); margin-top: 0.5rem; }
        .chart-container { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; }
        canvas { width: 100%; height: 300px; background: white; border-radius: var(--radius-md); }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <header class="main-header"><div class="container"><div class="header-wrapper"><div class="logo"><a href="../../index.html"><span class="logo-text">📅 نوبت‌دهی هوشمند</span></a></div><button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button><nav class="main-nav" id="mainNav"><ul class="nav-list"><li><a href="../../index.html" class="nav-link">خانه</a></li><li><a href="dashboard.html" class="nav-link">داشبورد</a></li><li><a href="platform-stats.html" class="nav-link active">آمار</a></li></ul></nav><div class="header-actions"><button class="theme-toggle" id="themeToggle">🌙</button><button class="btn btn-outline" id="logoutBtn">خروج</button></div></div></div></header>

    <main><div class="container-page">
        <h1 style="margin-bottom: 1.5rem;">📈 آمار پلتفرم</h1>
        <div class="stats-grid"><div class="stat-card"><div class="stat-value">۱,۲۴۷</div><div>کاربران</div></div><div class="stat-card"><div class="stat-value">۸۹</div><div>کسب‌وکارها</div></div><div class="stat-card"><div class="stat-value">۱۲,۴۵۰</div><div>نوبت‌ها</div></div><div class="stat-card"><div class="stat-value">۱۲۴M</div><div>درآمد</div></div></div>
        <div class="chart-container"><h3>نوبت‌های ماهانه</h3><canvas id="monthlyChart" width="800" height="300"></canvas></div>
        <div class="chart-container"><h3>رشد کاربران</h3><canvas id="usersChart" width="800" height="300"></canvas></div>
    </div></main>

    <footer class="main-footer"><div class="container"><div class="footer-grid"><div class="footer-col"><h4>📅 نوبت‌دهی هوشمند</h4><p>پلتفرم پیشرو در ارائه خدمات رزرو آنلاین</p></div></div><div class="footer-bottom"><p>&copy; ۱۴۰۴ تمامی حقوق محفوظ است.</p></div></div></footer>

    <script>
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
        if (!token || !user || user.role !== 'admin') { window.location.href = '../auth/login.html'; }
        function drawChart(canvasId, labels, data, title) { const canvas = document.getElementById(canvasId); if(!canvas) return; const ctx = canvas.getContext('2d'); canvas.width = canvas.offsetWidth; canvas.height = 300; ctx.clearRect(0,0,canvas.width,canvas.height); const padding={top:30,right:30,bottom:50,left:50}; const w=canvas.width-padding.left-padding.right; const h=canvas.height-padding.top-padding.bottom; const maxVal=Math.max(...data,1); const step=w/(data.length-1); ctx.beginPath(); ctx.strokeStyle='#E5E7EB'; for(let i=0;i<=4;i++){ const y=padding.top+(h/4)*i; ctx.moveTo(padding.left,y); ctx.lineTo(canvas.width-padding.right,y); ctx.stroke(); } ctx.beginPath(); ctx.strokeStyle='#3B82F6'; ctx.lineWidth=2; data.forEach((v,i)=>{ const x=padding.left+step*i; const y=padding.top+h-(v/maxVal)*h; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.stroke(); data.forEach((v,i)=>{ const x=padding.left+step*i; const y=padding.top+h-(v/maxVal)*h; ctx.beginPath(); ctx.fillStyle='#3B82F6'; ctx.arc(x,y,4,0,Math.PI*2); ctx.fill(); ctx.fillStyle='white'; ctx.arc(x,y,2,0,Math.PI*2); ctx.fill(); }); ctx.fillStyle='#6B7280'; ctx.font='10px Vazir'; ctx.textAlign='center'; labels.forEach((l,i)=>{ ctx.fillText(l,padding.left+step*i,canvas.height-padding.bottom+15); }); }
        drawChart('monthlyChart', ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور'],[120,135,148,162,175,188],'نوبت‌های ماهانه');
        drawChart('usersChart', ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور'],[850,920,1010,1120,1180,1247],'رشد کاربران');
        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); sessionStorage.clear(); window.location.href = '../../index.html'; });
        const mobileToggle = document.getElementById('mobileMenuToggle'), mainNav = document.getElementById('mainNav');
        mobileToggle?.addEventListener('click', () => mainNav.classList.toggle('active'));
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark-theme'); themeToggle.textContent = '☀️'; }
        themeToggle?.addEventListener('click', () => { const html = document.documentElement; if (html.classList.contains('dark-theme')) { html.classList.remove('dark-theme'); localStorage.setItem('theme', 'light'); themeToggle.textContent = '🌙'; } else { html.classList.add('dark-theme'); localStorage.setItem('theme', 'dark'); themeToggle.textContent = '☀️'; } });
    </script>
</body>
</html>
