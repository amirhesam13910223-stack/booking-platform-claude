name: Generate Prisma Migration

# اجرای دستی — چون سندباکس توسعه به binaries.prisma.sh دسترسی نداره،
# این workflow (با دسترسی کامل اینترنت رانر گیت‌هاب) migration واقعی
# رو تولید و مستقیم commit می‌کنه. هر فازی که schema.prisma عوض بشه
# دوباره از همین استفاده می‌کنیم.
on:
  workflow_dispatch:
    inputs:
      migration_name:
        description: "نام migration (مثلاً init یا add-business-tables)"
        required: true
        default: "init"

permissions:
  contents: write

jobs:
  generate-migration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: booking
          POSTGRES_PASSWORD: booking_dev_password
          POSTGRES_DB: booking_platform
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate migration
        run: npx prisma migrate dev --name "${{ github.event.inputs.migration_name }}" --schema=prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://booking:booking_dev_password@localhost:5432/booking_platform

      - name: Commit migration files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prisma/migrations
          git diff --cached --quiet && echo "No migration changes to commit" || git commit -m "chore: generate migration ${{ github.event.inputs.migration_name }}"
          git push
