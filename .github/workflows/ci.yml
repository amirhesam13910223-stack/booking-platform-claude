name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: booking
          POSTGRES_PASSWORD: booking_test_password
          POSTGRES_DB: booking_platform_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Run migrations (test db)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://booking:booking_test_password@localhost:5432/booking_platform_test

      - name: Test
        run: npm run test
        env:
          DATABASE_URL: postgresql://booking:booking_test_password@localhost:5432/booking_platform_test

      - name: Build
        run: npm run build
