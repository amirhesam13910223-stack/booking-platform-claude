name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: booking
          POSTGRES_PASSWORD: booking_test_password
          POSTGRES_DB: booking_platform_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Run migrations (test db)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://booking:booking_test_password@localhost:5432/booking_platform_test

      - name: Test
        run: npm run test 2>&1 | tee /tmp/test-output.log
        env:
          DATABASE_URL: postgresql://booking:booking_test_password@localhost:5432/booking_platform_test

      - name: On test failure, commit debug log for inspection
        if: failure()
        run: |
          mkdir -p .ci-debug
          cp /tmp/test-output.log .ci-debug/last-test-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .ci-debug/last-test-failure.log
          git commit -m "chore: capture test failure log [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build

      - name: Smoke test — boot server and hit real endpoints
        run: |
          set -e
          node apps/backend/dist/main.js &
          SERVER_PID=$!

          for i in $(seq 1 20); do
            if curl -sf http://localhost:3001/api/v1/auth/me -o /dev/null 2>/dev/null; then break; fi
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/v1/auth/me | grep -q "401"; then break; fi
            sleep 1
          done

          echo "--- register/request-otp ---"
          OTP_RESPONSE=$(curl -s -X POST http://localhost:3001/api/v1/auth/register/request-otp \
            -H "Content-Type: application/json" \
            -d '{"phone":"09121234567"}')
          echo "$OTP_RESPONSE"
          CODE=$(echo "$OTP_RESPONSE" | node -e "process.stdin.once('data', d => { const j = JSON.parse(d); if (!j.debugCode) { console.error('debugCode missing!'); process.exit(1); } console.log(j.debugCode); })")
          echo "OTP code extracted: $CODE"

          echo "--- register/verify ---"
          REGISTER_RESPONSE=$(curl -s -X POST http://localhost:3001/api/v1/auth/register/verify \
            -H "Content-Type: application/json" \
            -d "{\"phone\":\"09121234567\",\"code\":\"$CODE\",\"fullName\":\"تست\",\"password\":\"Password1\"}")
          echo "$REGISTER_RESPONSE"
          ACCESS_TOKEN=$(echo "$REGISTER_RESPONSE" | node -e "process.stdin.once('data', d => { const j = JSON.parse(d); if (!j.accessToken) { console.error('accessToken missing!'); process.exit(1); } console.log(j.accessToken); })")

          echo "--- auth/me with access token ---"
          ME_RESPONSE=$(curl -s http://localhost:3001/api/v1/auth/me -H "Authorization: Bearer $ACCESS_TOKEN")
          echo "$ME_RESPONSE"
          echo "$ME_RESPONSE" | node -e "process.stdin.once('data', d => { const j = JSON.parse(d); if (j.phone !== '09121234567') { console.error('phone mismatch!'); process.exit(1); } console.log('OK: /auth/me matches registered phone'); })"

          echo "--- auth/me without token must be rejected ---"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/v1/auth/me)
          if [ "$STATUS" != "401" ]; then echo "expected 401, got $STATUS"; exit 1; fi
          echo "OK: unauthenticated request correctly rejected with 401"

          echo "--- create business (validates BusinessRoleGuard + transaction) ---"
          BUSINESS_RESPONSE=$(curl -s -X POST http://localhost:3001/api/v1/businesses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -d '{"name":"آرایشگاه تست","category":"beauty"}')
          echo "$BUSINESS_RESPONSE"
          BUSINESS_ID=$(echo "$BUSINESS_RESPONSE" | node -e "process.stdin.once('data', d => { const j = JSON.parse(d); if (!j.id || j.status !== 'PENDING_REVIEW') { console.error('unexpected business response'); process.exit(1); } console.log(j.id); })")
          echo "Business created: $BUSINESS_ID"

          echo "--- owner can view their own business via BusinessRoleGuard ---"
          OWNER_VIEW_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/v1/businesses/$BUSINESS_ID -H "Authorization: Bearer $ACCESS_TOKEN")
          if [ "$OWNER_VIEW_STATUS" != "200" ]; then echo "expected 200, got $OWNER_VIEW_STATUS"; exit 1; fi
          echo "OK: owner can view their PENDING_REVIEW business"

          echo "--- unapproved business must NOT be publicly visible ---"
          PUBLIC_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/v1/discover/businesses/$BUSINESS_ID)
          if [ "$PUBLIC_STATUS" != "404" ]; then echo "expected 404 for unapproved business, got $PUBLIC_STATUS"; exit 1; fi
          echo "OK: PENDING_REVIEW business correctly hidden from public discovery"

          echo "--- public discovery search must NOT be swallowed by /businesses/:id (routing collision check) ---"
          DISCOVER_SEARCH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3001/api/v1/discover/businesses")
          if [ "$DISCOVER_SEARCH_STATUS" != "200" ]; then echo "expected 200, got $DISCOVER_SEARCH_STATUS"; exit 1; fi
          echo "OK: public discovery search route resolves correctly"

          echo "--- a random other user must NOT access this business ---"
          OTHER_OTP=$(curl -s -X POST http://localhost:3001/api/v1/auth/register/request-otp -H "Content-Type: application/json" -d '{"phone":"09129999999"}')
          OTHER_CODE=$(echo "$OTHER_OTP" | node -e "process.stdin.once('data', d => console.log(JSON.parse(d).debugCode))")
          OTHER_REGISTER=$(curl -s -X POST http://localhost:3001/api/v1/auth/register/verify -H "Content-Type: application/json" -d "{\"phone\":\"09129999999\",\"code\":\"$OTHER_CODE\",\"fullName\":\"دیگری\",\"password\":\"Password1\"}")
          OTHER_TOKEN=$(echo "$OTHER_REGISTER" | node -e "process.stdin.once('data', d => console.log(JSON.parse(d).accessToken))")
          FORBIDDEN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/v1/businesses/$BUSINESS_ID -H "Authorization: Bearer $OTHER_TOKEN")
          if [ "$FORBIDDEN_STATUS" != "403" ]; then echo "expected 403, got $FORBIDDEN_STATUS"; exit 1; fi
          echo "OK: non-member correctly forbidden from another user's business (BusinessRoleGuard works)"

          kill $SERVER_PID
        env:
          DATABASE_URL: postgresql://booking:booking_test_password@localhost:5432/booking_platform_test
          JWT_ACCESS_SECRET: ci-smoke-test-access-secret
          JWT_REFRESH_SECRET: ci-smoke-test-refresh-secret
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 30d
          PORT: 3001
          CORS_ORIGIN: http://localhost:3000
          NODE_ENV: development
          OTP_DEBUG_EXPOSE: "true"
