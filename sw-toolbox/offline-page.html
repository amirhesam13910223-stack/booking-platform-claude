<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آفلاین | پلتفرم نوبت‌دهی هوشمند</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Vazir', Tahoma, sans-serif;
            background: linear-gradient(135deg, #EFF6FF 0%, #F8FAFC 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
        }
        .offline-container {
            text-align: center;
            padding: 2rem;
        }
        .offline-icon {
            font-size: 6rem;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.75rem;
            color: #1F2937;
            margin-bottom: 0.5rem;
        }
        p {
            color: #6B7280;
            margin-bottom: 2rem;
            max-width: 400px;
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #3B82F6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #2563EB;
            transform: translateY(-2px);
        }
        .retry-btn {
            background: #10B981;
            margin-right: 1rem;
        }
        .retry-btn:hover {
            background: #059669;
        }
        .tips {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #E5E7EB;
            font-size: 0.875rem;
            color: #9CA3AF;
        }
        @font-face {
            font-family: 'Vazir';
            src: url('https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/fonts/woff2/Vazir-Regular.woff2') format('woff2');
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>🔄 شما آفلاین هستید!</h1>
        <p>اتصال اینترنت شما قطع شده است. لطفاً اتصال خود را بررسی کنید و دوباره تلاش کنید.</p>
        <div>
            <button class="btn retry-btn" onclick="location.reload()">🔄 تلاش مجدد</button>
            <a href="/" class="btn">🏠 بازگشت به صفحه اصلی</a>
        </div>
        <div class="tips">
            💡 نکته: پس از اتصال به اینترنت، تغییرات شما به طور خودکار همگام‌سازی می‌شوند.
        </div>
    </div>
    <script>
        // بررسی خودکار اتصال
        function checkConnection() {
            if (navigator.onLine) {
                window.location.href = '/';
            }
        }
        setInterval(checkConnection, 3000);
        
        window.addEventListener('online', () => {
            window.location.href = '/';
        });
    </script>
</body>
</html>
